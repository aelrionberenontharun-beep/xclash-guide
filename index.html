const DATA={"s1Content": {"en": "<article class=\"chapter\" id=\"en-1-purpose-and-source-hierarchy\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Purpose and source hierarchy</h2><ul>\n<li>This guide is a practical union leadership guide for X-Clash Season 1: Winter Is Coming / Polar Tempest. It is designed for any union, not for one specific server.</li>\n<li>Source hierarchy: official X-Clash / Strawberry material is treated as highest authority; Animality / Pioneer Test Group as strong practical evidence; experienced guide contributors and player reports as useful field evidence; isolated comments as low-confidence hints.</li>\n<li>If the event calendar, official spreadsheet or current in-game rules contradict older Discord posts, always follow the current in-game information first.</li>\n<li>The purpose is not to explain every button, but to give leaders and active players a usable order of priorities: heat, territory, route, diplomacy, stamina, rewards and endgame security.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-2-season-1-in-one-sentence\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Season 1 in one sentence</h2><ul>\n<li>Season 1 is not only a combat season. It is a logistics, survival and territory-control season.</li>\n<li>The strongest unions are not always the ones that attack the most. They are the ones that keep their players warm, hold useful mines and cities, use stamina efficiently, respect agreements when useful and prepare the final weeks early.</li>\n<li>The central principle is: stay warm, expand with purpose, hold what matters, and do not wait until the last week to fix strategic mistakes.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-3-preparation-before-entering-the-season\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Preparation before entering the season</h2><ul>\n<li>Teach players how to park their castles correctly. Season 1 requires tight castle placement inside warm zones; scattered castles freeze and become inefficient.</li>\n<li>Make sure players understand the rally point / union teleport placement mechanic. If a player relocates incorrectly, the union may lose time and heat coverage.</li>\n<li>Remove teams from castle wall defense before dangerous war phases unless leadership instructs otherwise: Castle Wall &gt; City Defense &gt; uncheck Join the defense for each team. Leaving teams on the wall can let enemies drain troops.</li>\n<li>Save stamina. Frost mines, zombies, monsters, skeletons, dragons, Nightfall wolves/sharks and recurring events all compete for the same stamina pool.</li>\n<li>Save purple S hero shards. A five-star Crystal can be promoted during Season 1 into a gold S+ version, but star-up costs can become expensive.</li>\n<li>Expect bugs. Season 1 mechanics have changed between server groups; event calendar and live game rules must be checked frequently.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-4-heat-freezing-and-furnaces\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Heat, freezing and furnaces</h2><ul>\n<li>There are two important furnace concepts. The personal Thermal Furnace supports your own castle, resistance and ability to fight or conquer. The Union Furnace provides heat to surrounding castles and helps the union operate in colder zones.</li>\n<li>Cold Snap is the recurring danger. If players do not keep their furnace ready, castles may freeze and lose access to important activities.</li>\n<li>A frozen castle can still do some tasks: kill Frost Zombies, farm resources, kill normal zombies, plunder wagons, complete some intelligence quests, do some tavern plunder tasks, attack World Boss and relocate.</li>\n<li>A frozen castle cannot do key actions such as fighting Elite Zombies, launching rallies or joining Union Boss. This is why warming and furnace discipline are not optional.</li>\n<li>Union Furnace placement matters. Place it so it covers active castles and important operational areas. When moving deeper, placing it near or inside useful occupied city areas is often stronger than placing it randomly.</li>\n<li>Occupied cities provide local heat. Frost mines do not provide heat. The inner map is colder than the outer map, so moving inward too early can create problems during Cold Snap.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-5-castle-placement-and-contaminated-land\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Castle placement and contaminated land</h2><ul>\n<li>Castles should normally be parked inside the warm area, close to the union group and within practical range of the Union Furnace.</li>\n<li>Avoid dark or contaminated land around mines and cities when possible. Reports indicate that it can bring restrictions and greater attack risk, especially compared with normal safe land.</li>\n<li>Early in the season, many unions stay near level 1 village or level 2 frost mine areas because the temperature is easier to manage.</li>\n<li>Before moving the whole union, heat key players first, check furnace coverage, and make sure weaker players know where to park.</li>\n<li>A move is not only a teleport decision. It is a heat, rally, defense, stamina and activity decision.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-6-mines-cities-and-ice-crystals\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Mines, cities and ice crystals</h2><ul>\n<li>Frost mines and cities are the scoring backbone of Season 1. Capturing is useful, but holding is what matters for Ice Crystal points.</li>\n<li>Community and official-derived notes repeatedly indicate that Ice Crystal value is based on what the union holds, not merely on what it once captured. Dropping territory can therefore reduce value.</li>\n<li>Base frost mine capacity is commonly reported as 3. Each additional city or village usually adds mine capacity; level 6 cities can add more, commonly reported as +2.</li>\n<li>City capacity and mine capacity vary by home server and cross-server phase. Reports mention home caps such as 4 cities and 7 mines, and cross-server caps such as 4 cities and higher mine limits. Always verify in Union City and current event rules.</li>\n<li>First capture rewards can give union loot boxes. These should be handled fairly by leadership. Check whether a mine or city already had a first-capture tag before expecting rewards.</li>\n<li>Do not abandon important cities or mines without coordination. Territory is score, access, route control, heat planning and future negotiation power.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-7-route-planning-and-early-expansion\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>7. Route planning and early expansion</h2><ul>\n<li>Do not overplan a perfect route before the season opens, because the starting location may not be known until the map begins.</li>\n<li>Once the union lands, plan a route quickly. The path should move toward valuable mines, useful cities and eventually key city areas.</li>\n<li>If a frost mine boss is too strong, do not waste the whole day. Pivot to a nearby lower-level mine and keep the route moving.</li>\n<li>Frost mines do not always need to be captured in numerical order, but they usually must touch owned land. Diagonal contact is generally not enough; adjacency matters.</li>\n<li>City levels open by time gates. Early city declarations may be available more often, while later in Season 1 they may be restricted to specific days such as Wednesday and Saturday.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-8-kingdom-expedition-and-outposts\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>8. Kingdom Expedition and outposts</h2><ul>\n<li>Kingdom Expedition opens the cross-server phase. R4/R5 usually place outposts on other servers. Outposts cannot normally be placed on the home server.</li>\n<li>Reports differ on whether outposts can be moved, so assume placement is important and check the current event interface before committing.</li>\n<li>After an outpost is placed, the first mine connected to the outpost often becomes the practical starting point. Expansion then follows adjacent land.</li>\n<li>Once Expedition is open, free relocation can often be used by moving through expedition and returning correctly. This should be practiced by inexperienced players to avoid wasting teleports.</li>\n<li>Do not invade blindly. Trading and diplomacy with other servers can save troops, especially because Clash of Kingdoms and other events still continue during Season 1.</li>\n<li>Each union may choose its own target, and several unions can pressure the same server. This makes diplomacy and timing more valuable than emotional attacks.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-9-diplomacy-war-days-and-tiles\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>9. Diplomacy, war days and tiles</h2><ul>\n<li>Season 1 can destroy troop counts if unions attack castles without purpose. Many servers use agreements to avoid unnecessary castle attacks and preserve soldiers.</li>\n<li>Coexistence is a strategy, not weakness. If two unions can trade objectives, exchange short holding windows or avoid burning castles, both sides may progress faster.</li>\n<li>Resource tiles are different from castles. Unless there is a non-aggression agreement, enemies on resource tiles can often be attacked or pushed away.</li>\n<li>War days require clear instructions. If the union fights, fight with targets and timing. If the union respects an agreement, communicate it clearly.</li>\n<li>Inactives and players who do not want to fight should understand shield expectations. Even if agreements exist, mistakes, outsiders or tile conflicts can still happen.</li>\n<li>Royal City during Season 1 may become 0°C during Clash of Kingdoms, but this is not a permanent kingdom-wide heat solution.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-10-class-hall-class-skills-and-reset-strategy\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>10. Class Hall, class skills and reset strategy</h2><ul>\n<li>Class Hall and class experience are important Season 1 systems. The Architect class is frequently discussed because of construction, research and siege-related utility.</li>\n<li>Some skills increase city wall durability damage during city siege. This matters for cities more than for ordinary monster hits.</li>\n<li>Some skills, such as Forced March or Siege Banner, have mixed or inconsistent community test results. Do not overinvest blindly without observing your own server’s behavior.</li>\n<li>Level 15+ skills have been unlocked at different times for different servers. If a row is locked, it may be server stage, bug or delayed unlock.</li>\n<li>Class skill reset can be used strategically. Normal skills learned after reset should remain useful after Season 1, while Season skills may be refunded or become unavailable after the season.</li>\n<li>Near the end of Season 1, consider moving points away from temporary Season-only skills and toward long-term normal skills such as Research, Building and Resource Production, if those match the player’s goals.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-11-heroes-season-boosts-crystal-and-level-swap\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>11. Heroes, Season Boosts, Crystal and Level Swap</h2><ul>\n<li>Season Boost heroes mentioned in community material include Crystal, Sera, Fenixia/Fenxia and Daphne. These heroes deserve extra attention during Season 1 planning.</li>\n<li>Crystal is especially important for free-to-play and low-spend players. A five-star Crystal can be promoted into a gold S+ version during Season 1, but further star progress may require many purple S+ shards.</li>\n<li>Level Swap swaps hero EXP levels only. It does not transfer stars, ascension, medals or skill levels. If a hero drops to a lower level, some skills may lock again until the level is restored.</li>\n<li>Do not rush Level Swap onto a new gold hero with no stars. A high-level but low-star hero may still be unusable. The stronger strategy is to collect shards first, then swap when the target hero can become battle-ready.</li>\n<li>Sera’s Bow of Tomorrow is exclusive gear. It does not replace normal gear; it adds extra skills and can increase max skill levels. Unlock usually requires five-star Sera and specific bow shards. Universal exclusive gear shards may upgrade but not unlock it.</li>\n<li>Exclusive gear can be expensive. Black Market / Season Festival may provide slower access later, but this depends on available shops and server timing.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-12-level-6-cities-royal-city-and-endgame-timing\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>12. Level 6 cities, Royal City and endgame timing</h2><ul>\n<li>Level 6 cities are among the most important normal cities before Royal City. They can provide high Ice Crystal value and may be connected to Royal City access or influence.</li>\n<li>If level 6 cities are already controlled by stronger unions, negotiation may be more realistic than direct force. Agreements, temporary holding windows and coordinated rewards can matter.</li>\n<li>Week 7 is widely treated as the decisive endgame push. Waiting until the final days is dangerous because protection timers, locked maps or changing rules may prevent recovery.</li>\n<li>Do not lose a level 6 city late and assume it can be reclaimed after Season 1. Several server reports describe cities and mines becoming locked after the season or after late Week 7.</li>\n<li>Royal City gives authority, rewards, titles or buffs, but it does not necessarily give Ice Crystals. Royal Furnace heat is local, not a permanent server-wide temperature solution.</li>\n<li>The practical endgame goal is to hold the best realistic combination of factories, useful cities, frost mines and key access points while avoiding unnecessary troop losses.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-13-after-season-1-and-black-market\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>13. After Season 1 and Black Market</h2><ul>\n<li>After Season 1, the Season Festival / Black Market phase may appear. This is an off-season recovery and preparation phase.</li>\n<li>Black Gold Coins, bingo quests and shop rotations may become important. Prioritize items that support long-term growth: exclusive shards when needed, decorations, frames, speedups, hero-related resources and other limited-value items.</li>\n<li>Some seasonal buildings or map elements may remain visually or functionally for a time, while S1-specific events such as Cold Snap, treasures or Expedition may end.</li>\n<li>Rules after the season have changed between server groups. Do not assume old reclaim windows still work. Plan as if Week 7 is your last reliable chance to fix territory problems.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-14-daily-leadership-checklist\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>14. Daily leadership checklist</h2><ul>\n<li>Check event calendar before giving orders. Rules can change by week.</li>\n<li>Check furnace status, coal/gold donations and whether active players are inside warm coverage.</li>\n<li>Confirm daily mine attempts are used on route-relevant targets, not random isolated territory.</li>\n<li>Coordinate city declarations and avoid accidental drops, especially after mid-season.</li>\n<li>Track diplomacy: who has non-aggression agreements, who can be hit on tiles, who is allowed short reward access.</li>\n<li>Remind players to spend stamina intelligently between mines, zombies, Arm Race, skeletons, dragons, Nightfall wolves/sharks and other recurring events.</li>\n<li>Prepare Week 7 before it arrives: key cities, access mines, enemy holding patterns, furnace placement, rally leaders and shield reminders.</li>\n</ul></article>\n<article class=\"chapter\" id=\"en-15-glossary-and-final-summary\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>15. Glossary and final summary</h2><ul>\n<li>Thermal Furnace: personal furnace that supports castle heat and resistance.</li>\n<li>Union Furnace: alliance furnace that warms the area and helps the union operate in colder zones.</li>\n<li>Cold Snap: recurring temperature drop that can freeze castles.</li>\n<li>Frost Mine: seasonal mine territory used for expansion, rewards and Ice Crystal scoring.</li>\n<li>City: seasonal territory such as village, manor, factory, town or level 6 metropolis/library.</li>\n<li>Ice Crystals: core Season 1 scoring resource, strongly tied to held territory.</li>\n<li>Outpost: Expedition structure used to start cross-server expansion.</li>\n<li>Tile: resource gathering field; often treated differently from castle attacks.</li>\n<li>Final summary: Season 1 rewards unions that stay warm, coordinate territory, use stamina well, respect useful agreements, and secure endgame positions before it is too late.</li>\n</ul></article>", "de": "<article class=\"chapter\" id=\"de-1-zweck-und-quellengewichtung\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Zweck und Quellengewichtung</h2><ul>\n<li>Dieser Guide ist eine praktische Führungsanleitung für X-Clash Season 1: Winter Is Coming / Polar Tempest. Er ist für jede Union nutzbar und nicht auf einen bestimmten Server ausgerichtet.</li>\n<li>Quellengewichtung: offizielles X-Clash-Material / Strawberry zählt am höchsten; Animality / Pioneer Test Group gilt als starke Praxiserfahrung; erfahrene Guide-Autoren und Spielerberichte sind nützliche Feldberichte; einzelne Kommentare sind Hinweise mit niedrigerer Sicherheit.</li>\n<li>Wenn Event-Kalender, offizielle Tabelle oder aktuelle Ingame-Regeln älteren Discord-Posts widersprechen, gilt zuerst die aktuelle Ingame-Information.</li>\n<li>Ziel ist nicht jede Schaltfläche zu erklären, sondern eine brauchbare Reihenfolge für Führung und aktive Spieler zu geben: Wärme, Gebiet, Route, Diplomatie, Ausdauer, Belohnungen und Endgame-Sicherung.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-2-season-1-in-einem-satz\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Season 1 in einem Satz</h2><ul>\n<li>Season 1 ist nicht nur eine Kampfseason. Es ist eine Logistik-, Überlebens- und Gebietskontrollseason.</li>\n<li>Die stärksten Unionen sind nicht immer jene, die am meisten angreifen. Stark sind jene, die ihre Spieler warm halten, nützliche Minen und Städte halten, Ausdauer effizient nutzen, sinnvolle Absprachen respektieren und die Schlussphase früh vorbereiten.</li>\n<li>Das Grundprinzip lautet: warm bleiben, mit Ziel expandieren, Wichtiges halten und strategische Fehler nicht erst in der letzten Woche korrigieren wollen.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-3-vorbereitung-vor-season-start\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Vorbereitung vor Season-Start</h2><ul>\n<li>Spieler müssen wissen, wie sie ihre Burg richtig platzieren. Season 1 verlangt enge Burgaufstellung in warmen Zonen; verstreute Burgen frieren schneller und arbeiten ineffizient.</li>\n<li>Spieler sollten die Mechanik von Sammelpunkt / Unions-Teleport verstehen. Falsches Umziehen kostet Zeit und kann die Wärmeabdeckung stören.</li>\n<li>Teams vor gefährlichen Kriegsphasen von der Burgmauer-Verteidigung entfernen, sofern Führung nichts anderes sagt: Burgmauer &gt; Stadtverteidigung &gt; Bei jedem Team „Verteidigung beitreten“ deaktivieren. Teams auf der Mauer können Gegnern erlauben, Soldaten zu entziehen.</li>\n<li>Ausdauer sparen. Frostminen, Zombies, Monster, Skelette, Drachen, Nightfall-Wölfe/-Haie und wiederkehrende Events greifen alle auf dieselbe Ausdauer zurück.</li>\n<li>Violette S-Heldenfragmente sparen. Eine 5-Sterne-Crystal kann während Season 1 zu einer goldenen S+ Version befördert werden, aber weiteres Hochsternen kann teuer werden.</li>\n<li>Mit Fehlern rechnen. Season-1-Regeln änderten sich zwischen Servergruppen; Event-Kalender und aktuelle Spielregeln müssen regelmäßig geprüft werden.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-4-warme-einfrieren-und-ofen\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Wärme, Einfrieren und Öfen</h2><ul>\n<li>Es gibt zwei wichtige Ofen-Konzepte. Der persönliche Thermo-Ofen unterstützt die eigene Burg, Widerstand und die Fähigkeit zu kämpfen oder Gebiete einzunehmen. Der Unionsofen spendet Wärme für Burgen in der Umgebung und hilft der Union in kälteren Zonen.</li>\n<li>Kälteeinbruch ist die wiederkehrende Gefahr. Wenn Spieler ihren Ofen nicht bereit halten, können Burgen einfrieren und wichtige Aktionen verlieren.</li>\n<li>Eine eingefrorene Burg kann noch einige Dinge tun: Frost-Zombies töten, Ressourcen farmen, normale Zombies töten, Wagen plündern, manche Geheimdienstaufgaben erledigen, einige Tavernen-Plünderaufgaben machen, den Weltboss angreifen und umziehen.</li>\n<li>Eine eingefrorene Burg kann zentrale Aktionen nicht ausführen: Elite-Zombies bekämpfen, Rallys starten oder am Unionsboss teilnehmen. Deshalb sind Wärme und Ofendisziplin Pflicht.</li>\n<li>Die Platzierung des Unionsofens ist wichtig. Er sollte aktive Burgen und operative Zonen abdecken. Beim Vorrücken ist ein Platz nahe oder in nützlichen besetzten Städten oft stärker als ein Zufallsplatz.</li>\n<li>Besetzte Städte geben lokale Wärme. Frostminen geben keine Wärme. Die innere Karte ist kälter als die äußere; zu frühes Vorrücken nach innen kann beim Kälteeinbruch Probleme verursachen.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-5-burgplatzierung-und-kontaminiertes-land\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Burgplatzierung und kontaminiertes Land</h2><ul>\n<li>Burgen sollten normalerweise in der warmen Zone stehen, nahe bei der Unionsgruppe und innerhalb sinnvoller Reichweite des Unionsofens.</li>\n<li>Dunkles oder kontaminiertes Land um Minen und Städte sollte möglichst gemieden werden. Berichte deuten auf Einschränkungen und höheres Angriffsrisiko gegenüber normalem Land hin.</li>\n<li>Viele Unionen bleiben zu Beginn bei Level-1-Dörfern oder Level-2-Frostminenbereichen, weil die Temperatur dort leichter zu halten ist.</li>\n<li>Vor einem großen Umzug zuerst wichtige Spieler aufwärmen, Ofenabdeckung prüfen und schwächeren Spielern klar sagen, wo sie stehen sollen.</li>\n<li>Ein Umzug ist nicht nur eine Teleport-Entscheidung. Er betrifft Wärme, Rallys, Verteidigung, Ausdauer und Aktivität.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-6-minen-stadte-und-eiskristalle\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Minen, Städte und Eiskristalle</h2><ul>\n<li>Frostminen und Städte sind das Rückgrat der Wertung in Season 1. Erobern ist nützlich, aber Halten ist entscheidend für Eiskristallpunkte.</li>\n<li>Offizielle und communitybasierte Hinweise zeigen wiederholt: Der Eiskristallwert hängt davon ab, was die Union hält, nicht nur davon, was sie einmal eingenommen hat. Aufgeben kann Wert kosten.</li>\n<li>Die Grundkapazität für Frostminen wird häufig mit 3 angegeben. Jede zusätzliche Stadt oder jedes Dorf erhöht normalerweise die Minenkapazität; Level-6-Städte können mehr geben, oft +2.</li>\n<li>Stadt- und Minenlimits variieren je nach Heimserver und Cross-Server-Phase. Berichte nennen z. B. 4 Städte und 7 Minen auf dem Heimatserver sowie 4 Städte und höhere Minenlimits extern. Immer im Unionsstadt-Menü und aktuellen Event prüfen.</li>\n<li>Ersteroberungen können Unions-Beutekisten geben. Diese sollten durch die Führung fair verteilt werden. Vorher prüfen, ob ein Gebiet bereits eine Ersteroberungs-Markierung hatte.</li>\n<li>Wichtige Städte oder Minen nicht ohne Absprache aufgeben. Gebiet bedeutet Punkte, Zugang, Routenkontrolle, Wärmeplanung und Verhandlungsmacht.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-7-routenplanung-und-fruhe-expansion\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>7. Routenplanung und frühe Expansion</h2><ul>\n<li>Vor Season-Start sollte keine perfekte Route festgezurrt werden, weil die Startposition oft erst mit Kartenöffnung klar wird.</li>\n<li>Nach dem Start muss die Union schnell eine Route festlegen. Der Weg sollte zu wertvollen Minen, nützlichen Städten und später zu Schlüsselgebieten führen.</li>\n<li>Wenn ein Frostminen-Boss zu stark ist, nicht den ganzen Tag verlieren. Auf eine niedrigere nahe Mine ausweichen und die Route in Bewegung halten.</li>\n<li>Frostminen müssen nicht immer numerisch erobert werden, aber sie müssen normalerweise an eigenes Land angrenzen. Diagonaler Kontakt reicht meist nicht; direkte Nachbarschaft zählt.</li>\n<li>Stadtlevel öffnen zeitgesteuert. Früh können Stadtdeklarationen häufiger möglich sein; später sind sie oft auf bestimmte Tage wie Mittwoch und Samstag beschränkt.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-8-konigreichsexpedition-und-auenposten\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>8. Königreichsexpedition und Außenposten</h2><ul>\n<li>Die Königreichsexpedition öffnet die Cross-Server-Phase. R4/R5 setzen normalerweise Außenposten auf anderen Servern. Auf dem Heimatserver sind Außenposten normalerweise nicht möglich.</li>\n<li>Berichte widersprechen sich dazu, ob Außenposten bewegt werden können. Deshalb Standort als wichtig behandeln und vor dem Setzen die aktuelle Eventoberfläche prüfen.</li>\n<li>Nach dem Setzen eines Außenpostens ist die damit verbundene erste Mine oft der praktische Startpunkt. Danach folgt Expansion über angrenzendes Land.</li>\n<li>Sobald Expedition offen ist, kann oft kostenloses Umziehen über Expedition und Rückkehr genutzt werden. Ungeübte Spieler sollten das üben, um keine Teleports zu verschwenden.</li>\n<li>Nicht blind einfallen. Handel und Diplomatie mit anderen Servern sparen Truppen, weil Clash of Kingdoms und andere Events während Season 1 weiterlaufen.</li>\n<li>Jede Union kann eigene Ziele wählen, und mehrere Unionen können denselben Server bedrängen. Dadurch sind Diplomatie und Timing wertvoller als emotionale Angriffe.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-9-diplomatie-kriegstage-und-ressourcenfelder\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>9. Diplomatie, Kriegstage und Ressourcenfelder</h2><ul>\n<li>Season 1 kann Truppenzahlen zerstören, wenn Burgen ohne Ziel angegriffen werden. Viele Server nutzen Absprachen, um unnötige Burgangriffe zu vermeiden und Soldaten zu erhalten.</li>\n<li>Koexistenz ist eine Strategie, keine Schwäche. Wenn Unionen Ziele tauschen, kurze Belohnungsfenster gewähren oder Burgen nicht brennen, kommen oft beide schneller voran.</li>\n<li>Ressourcenfelder unterscheiden sich von Burgen. Wenn kein Nichtangriffspakt besteht, können Gegner auf Ressourcenfeldern oft angegriffen oder vertrieben werden.</li>\n<li>Kriegstage brauchen klare Ansagen. Wenn gekämpft wird, dann mit Ziel und Timing. Wenn eine Absprache gilt, muss sie klar kommuniziert werden.</li>\n<li>Inaktive und Nichtkämpfer sollten Schildregeln kennen. Auch bei Absprachen können Fehler, Fremde oder Ressourcenfeldkonflikte passieren.</li>\n<li>Die Königsstadt kann während Season 1 im Clash of Kingdoms auf 0 °C fallen, ist aber keine dauerhafte Wärmequelle für das ganze Königreich.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-10-klassenhalle-klassenskills-und-reset-strategie\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>10. Klassenhalle, Klassenskills und Reset-Strategie</h2><ul>\n<li>Klassenhalle und Klassenerfahrung sind wichtige Season-1-Systeme. Die Architekt-Klasse wird oft wegen Bau-, Forschungs- und Belagerungsnutzen diskutiert.</li>\n<li>Einige Skills erhöhen den Schaden an der Stadtmauer-Haltbarkeit während der Stadtbelagerung. Das zählt eher für Städte als für normale Monsterangriffe.</li>\n<li>Bei Skills wie Eilmarsch oder Belagerungsbanner gibt es gemischte Community-Tests. Nicht blind viele Punkte investieren, ohne das Verhalten auf dem eigenen Server zu beobachten.</li>\n<li>Level-15+-Skills wurden auf verschiedenen Servern zu unterschiedlichen Zeiten freigeschaltet. Gesperrte Reihen können Serverphase, Fehler oder verzögertes Freischalten bedeuten.</li>\n<li>Klassenskill-Reset kann strategisch genutzt werden. Normale Skills sollten nach Season 1 weiter nutzbar bleiben, während Season-Skills zurückerstattet werden oder verschwinden können.</li>\n<li>Gegen Ende von Season 1 kann es sinnvoll sein, Punkte aus temporären Season-Skills in langfristige normale Skills wie Forschung, Bauen und Ressourcenproduktion zu verschieben.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-11-helden-season-boosts-crystal-und-level-tausch\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>11. Helden, Season-Boosts, Crystal und Level-Tausch</h2><ul>\n<li>Als Season-Boost-Helden wurden in Community-Material Crystal, Sera, Fenixia/Fenxia und Daphne genannt. Sie verdienen besondere Aufmerksamkeit bei Planung und Ressourcen.</li>\n<li>Crystal ist besonders wichtig für Free-to-play- und Low-Spend-Spieler. Eine 5-Sterne-Crystal kann in Season 1 zu einer goldenen S+ Version werden, aber spätere Sterne brauchen viele violette S+ Fragmente.</li>\n<li>Level-Tausch tauscht nur Helden-EXP-Level. Sterne, Aufstieg, Medaillen und Skill-Level werden nicht übertragen. Sinkt ein Held im Level, können Skills wieder gesperrt werden.</li>\n<li>Level-Tausch nicht voreilig auf einen neuen Goldhelden ohne Sterne nutzen. Ein hoher Level ohne Sterne kann trotzdem unbrauchbar sein. Besser zuerst Fragmente sammeln, dann tauschen, wenn der Zielheld einsatzbereit wird.</li>\n<li>Seras Bogen von Morgen ist exklusive Ausrüstung. Er ersetzt normale Ausrüstung nicht, sondern fügt zusätzliche Skills hinzu und kann Skill-Maximallevel erhöhen. Meist braucht er 5-Sterne-Sera und spezifische Bogenfragmente.</li>\n<li>Exklusive Ausrüstung kann teuer sein. Schwarzmarkt / Season-Festival können später langsamen Zugang geben, abhängig von Shop und Serverphase.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-12-level-6-stadte-konigsstadt-und-endgame-timing\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>12. Level-6-Städte, Königsstadt und Endgame-Timing</h2><ul>\n<li>Level-6-Städte gehören zu den wichtigsten normalen Städten vor der Königsstadt. Sie können hohen Eiskristallwert geben und mit Zugang oder Einfluss auf die Königsstadt verbunden sein.</li>\n<li>Wenn Level-6-Städte bereits von stärkeren Unionen kontrolliert werden, ist Verhandlung oft realistischer als direkte Gewalt. Absprachen, kurze Haltefenster und koordinierte Belohnungen können zählen.</li>\n<li>Woche 7 gilt in vielen Berichten als entscheidende Endgame-Pushphase. Bis zu den letzten Tagen zu warten ist riskant, weil Schutzzeiten, Kartensperren oder Regeländerungen Rückeroberung verhindern können.</li>\n<li>Eine Level-6-Stadt spät zu verlieren und davon auszugehen, sie nach Season 1 zurückzuholen, ist gefährlich. Mehrere Serverberichte beschreiben Sperren nach der Season oder nach später Woche 7.</li>\n<li>Die Königsstadt gibt Autorität, Belohnungen, Titel oder Buffs, aber nicht zwingend Eiskristalle. Der königliche Ofen wärmt lokal, nicht dauerhaft das ganze Königreich.</li>\n<li>Das praktische Endgame-Ziel ist die beste realistische Kombination aus Fabriken, nützlichen Städten, Frostminen und Zugängen zu halten, ohne unnötig Truppen zu verlieren.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-13-nach-season-1-und-schwarzmarkt\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>13. Nach Season 1 und Schwarzmarkt</h2><ul>\n<li>Nach Season 1 kann das Season-Festival / der Schwarzmarkt erscheinen. Das ist eine Offseason-Phase zur Erholung und Vorbereitung.</li>\n<li>Schwarzgoldmünzen, Bingo-Aufgaben und Shop-Rotationen können wichtig werden. Priorität haben langfristig nützliche Dinge: exklusive Fragmente, Dekorationen, Rahmen, Beschleunigungen, Heldenressourcen und limitierte Wertgegenstände.</li>\n<li>Einige saisonale Gebäude oder Kartenelemente können sichtbar oder funktional bleiben, während S1-spezifische Events wie Kälteeinbruch, Schätze oder Expedition enden.</li>\n<li>Regeln nach der Season unterschieden sich je nach Servergruppe. Nicht auf alte Rückeroberungsfenster vertrauen. Plane so, als wäre Woche 7 die letzte verlässliche Korrekturmöglichkeit.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-14-tagliche-fuhrungs-checkliste\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>14. Tägliche Führungs-Checkliste</h2><ul>\n<li>Event-Kalender prüfen, bevor Befehle gegeben werden. Regeln können sich wöchentlich ändern.</li>\n<li>Ofenstatus, Kohle-/Goldspenden und Wärmeabdeckung aktiver Spieler prüfen.</li>\n<li>Sicherstellen, dass tägliche Minenversuche für die Route genutzt werden und nicht für isolierte Zufallsgebiete.</li>\n<li>Stadtdeklarationen koordinieren und versehentliche Drops vermeiden, besonders ab Saisonmitte.</li>\n<li>Diplomatie verfolgen: Wer hat Nichtangriffspakte, wer darf auf Ressourcenfeldern angegriffen werden, wer erhält kurze Belohnungsfenster.</li>\n<li>Spieler an kluge Ausdauerverteilung erinnern: Minen, Zombies, Arm Race, Skelette, Drachen, Nightfall-Wölfe/-Haie und weitere Events.</li>\n<li>Woche 7 vorbereiten, bevor sie da ist: Schlüsselstädte, Zugangsmine, Gegnerzeiten, Ofenplatzierung, Rally-Führer und Schildhinweise.</li>\n</ul></article>\n<article class=\"chapter\" id=\"de-15-glossar-und-schlusszusammenfassung\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>15. Glossar und Schlusszusammenfassung</h2><ul>\n<li>Thermo-Ofen: persönlicher Ofen für Burgwärme und Widerstand.</li>\n<li>Unionsofen: Allianzofen, der Gebiet wärmt und Einsätze in kälteren Zonen ermöglicht.</li>\n<li>Kälteeinbruch: wiederkehrender Temperatursturz, der Burgen einfrieren kann.</li>\n<li>Frostmine: saisonales Minengebiet für Expansion, Belohnungen und Eiskristallwertung.</li>\n<li>Stadt: saisonales Gebiet wie Dorf, Herrenhaus, Fabrik, Stadt oder Level-6-Metropole/Bibliothek.</li>\n<li>Eiskristalle: zentrale Season-1-Wertungsressource, stark an gehaltenes Gebiet gebunden.</li>\n<li>Außenposten: Expeditionsstruktur zum Start der Cross-Server-Expansion.</li>\n<li>Ressourcenfeld: Sammelfeld; wird oft anders behandelt als Burgangriffe.</li>\n<li>Schlussfazit: Season 1 belohnt Unionen, die warm bleiben, Gebiete koordinieren, Ausdauer klug nutzen, sinnvolle Absprachen respektieren und Endgame-Positionen früh sichern.</li>\n</ul></article>", "es": "<article class=\"chapter\" id=\"es-1-proposito-y-jerarquia-de-fuentes\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Propósito y jerarquía de fuentes</h2><ul>\n<li>Esta guía es una guía práctica de liderazgo de unión para X-Clash Season 1: Winter Is Coming / Polar Tempest. Sirve para cualquier unión y no está adaptada a un servidor concreto.</li>\n<li>Jerarquía de fuentes: el material oficial de X-Clash / Strawberry tiene la máxima autoridad; Animality / Pioneer Test Group es evidencia práctica fuerte; creadores de guías y jugadores experimentados son informes de campo útiles; comentarios aislados son pistas de menor seguridad.</li>\n<li>Si el calendario del evento, la hoja oficial o las reglas actuales del juego contradicen publicaciones antiguas de Discord, se debe seguir primero la información actual del juego.</li>\n<li>El objetivo no es explicar cada botón, sino dar a líderes y jugadores activos un orden útil de prioridades: calor, territorio, ruta, diplomacia, stamina, recompensas y seguridad del final de temporada.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-2-season-1-en-una-frase\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Season 1 en una frase</h2><ul>\n<li>Season 1 no es solo una temporada de combate. Es una temporada de logística, supervivencia y control territorial.</li>\n<li>Las uniones más fuertes no siempre son las que más atacan. Son las que mantienen a sus jugadores calientes, conservan minas y ciudades útiles, usan la stamina con eficiencia, respetan acuerdos útiles y preparan pronto las últimas semanas.</li>\n<li>El principio central es: mantenerse caliente, expandirse con propósito, conservar lo importante y no esperar a la última semana para corregir errores estratégicos.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-3-preparacion-antes-de-entrar-en-la-temporada\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Preparación antes de entrar en la temporada</h2><ul>\n<li>Enseña a los jugadores a colocar correctamente sus castillos. Season 1 requiere castillos compactos dentro de zonas cálidas; los castillos dispersos se congelan y pierden eficiencia.</li>\n<li>Los jugadores deben entender la mecánica de punto de reunión / teletransporte de unión. Una reubicación incorrecta puede hacer perder tiempo y cobertura de calor.</li>\n<li>Quita los equipos de la defensa de la muralla antes de fases peligrosas de guerra, salvo instrucción contraria: Muralla del castillo &gt; Defensa de ciudad &gt; desmarcar Unirse a la defensa en cada equipo. Dejar equipos en la muralla puede permitir que el enemigo drene tropas.</li>\n<li>Ahorra stamina. Minas heladas, zombis, monstruos, esqueletos, dragones, lobos/tiburones de Nightfall y eventos recurrentes compiten por la misma stamina.</li>\n<li>Guarda fragmentos morados de héroe S. Una Crystal de cinco estrellas puede promocionarse durante Season 1 a una versión dorada S+, pero subirla de nuevo puede ser costoso.</li>\n<li>Espera errores. Las mecánicas de Season 1 cambiaron entre grupos de servidores; revisa con frecuencia el calendario del evento y las reglas actuales.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-4-calor-congelacion-y-hornos\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Calor, congelación y hornos</h2><ul>\n<li>Hay dos conceptos de horno. El Horno térmico personal ayuda a tu propio castillo, resistencia y capacidad para luchar o conquistar. El Horno de unión da calor a castillos cercanos y permite operar en zonas más frías.</li>\n<li>La Ola de frío es el peligro recurrente. Si los jugadores no tienen el horno preparado, los castillos pueden congelarse y perder actividades importantes.</li>\n<li>Un castillo congelado todavía puede matar zombis helados, recolectar recursos, matar zombis normales, saquear carros, completar algunas misiones de inteligencia, hacer algunas tareas de saqueo de taberna, atacar al Jefe mundial y reubicarse.</li>\n<li>Un castillo congelado no puede hacer acciones clave como luchar contra zombis élite, iniciar rallies o participar en el Jefe de unión. Por eso la disciplina de calor y horno es obligatoria.</li>\n<li>La ubicación del Horno de unión importa. Debe cubrir castillos activos y zonas operativas importantes. Al avanzar hacia zonas más frías, colocarlo cerca o dentro de ciudades ocupadas útiles suele ser mejor que colocarlo al azar.</li>\n<li>Las ciudades ocupadas dan calor local. Las minas heladas no dan calor. El centro del mapa es más frío que el exterior, así que entrar demasiado pronto puede causar problemas durante la Ola de frío.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-5-colocacion-del-castillo-y-terreno-contaminado\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Colocación del castillo y terreno contaminado</h2><ul>\n<li>Los castillos deberían colocarse dentro de la zona cálida, cerca del grupo de la unión y dentro del alcance práctico del Horno de unión.</li>\n<li>Evita terreno oscuro o contaminado alrededor de minas y ciudades si es posible. Los informes indican restricciones y mayor riesgo de ataque en comparación con terreno normal.</li>\n<li>Al inicio, muchas uniones permanecen cerca de aldeas de nivel 1 o zonas de minas heladas de nivel 2 porque la temperatura es más manejable.</li>\n<li>Antes de mover a toda la unión, calienta primero a los jugadores clave, verifica la cobertura del horno y comunica a los jugadores más débiles dónde deben colocarse.</li>\n<li>Moverse no es solo una decisión de teletransporte. Es una decisión de calor, rally, defensa, stamina y actividad.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-6-minas-ciudades-y-cristales-de-hielo\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Minas, ciudades y cristales de hielo</h2><ul>\n<li>Las minas heladas y las ciudades son la base de puntuación de Season 1. Capturar ayuda, pero conservar es lo que cuenta para los cristales de hielo.</li>\n<li>Notas oficiales y de comunidad indican repetidamente que el valor de cristales depende de lo que la unión conserva, no solo de lo que capturó una vez. Abandonar territorio puede reducir valor.</li>\n<li>La capacidad base de minas heladas se reporta frecuentemente como 3. Cada ciudad o aldea adicional suele aumentar la capacidad; ciudades de nivel 6 pueden dar más, a menudo +2.</li>\n<li>Los límites de ciudades y minas varían según servidor local y fase cross-server. Se mencionan límites como 4 ciudades y 7 minas en servidor propio, y 4 ciudades con límites mayores de minas fuera. Verifica siempre en Ciudad de unión y reglas actuales.</li>\n<li>La primera captura puede dar cajas de botín de unión. Deben distribuirse de forma justa. Comprueba si la mina o ciudad ya tenía etiqueta de primera captura.</li>\n<li>No abandones ciudades o minas importantes sin coordinación. El territorio significa puntuación, acceso, control de ruta, planificación de calor y poder de negociación.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-7-planificacion-de-ruta-y-expansion-temprana\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>7. Planificación de ruta y expansión temprana</h2><ul>\n<li>No cierres una ruta perfecta antes de abrir la temporada, porque la ubicación inicial puede no conocerse hasta que empiece el mapa.</li>\n<li>Cuando la unión aparece en el mapa, planifica rápido. La ruta debe llevar a minas valiosas, ciudades útiles y luego zonas clave.</li>\n<li>Si un jefe de mina helada es demasiado fuerte, no pierdas todo el día. Cambia a una mina cercana de menor nivel y mantén la expansión en movimiento.</li>\n<li>Las minas heladas no siempre deben capturarse por número, pero normalmente deben tocar territorio propio. El contacto diagonal suele no bastar; cuenta la adyacencia directa.</li>\n<li>Los niveles de ciudad se abren por tiempo. Al principio puede haber más declaraciones; más adelante suelen limitarse a días concretos como miércoles y sábado.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-8-expedicion-del-reino-y-puestos-avanzados\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>8. Expedición del reino y puestos avanzados</h2><ul>\n<li>La Expedición del reino abre la fase cross-server. R4/R5 suelen colocar puestos avanzados en otros servidores. Normalmente no se pueden colocar en el servidor propio.</li>\n<li>Los informes difieren sobre si se pueden mover los puestos avanzados; trata la ubicación como una decisión importante y revisa la interfaz actual antes de colocarlo.</li>\n<li>Después de colocar un puesto avanzado, la primera mina conectada suele ser el punto práctico de inicio. Luego la expansión sigue por territorio adyacente.</li>\n<li>Cuando la Expedición está abierta, a menudo se puede usar reubicación gratuita entrando y volviendo correctamente. Los jugadores sin experiencia deberían practicar para no gastar teletransportes.</li>\n<li>No invadas a ciegas. El comercio y la diplomacia con otros servidores ahorran tropas, porque Clash of Kingdoms y otros eventos continúan durante Season 1.</li>\n<li>Cada unión puede elegir objetivo, y varias uniones pueden presionar el mismo servidor. Por eso la diplomacia y el timing valen más que ataques emocionales.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-9-diplomacia-dias-de-guerra-y-casillas-de-recursos\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>9. Diplomacia, días de guerra y casillas de recursos</h2><ul>\n<li>Season 1 puede destruir tropas si se atacan castillos sin propósito. Muchos servidores usan acuerdos para evitar ataques innecesarios y conservar soldados.</li>\n<li>La coexistencia es estrategia, no debilidad. Si dos uniones intercambian objetivos, permiten ventanas cortas de recompensas o evitan quemar castillos, ambas pueden progresar más rápido.</li>\n<li>Las casillas de recursos son distintas de los castillos. Si no existe pacto de no agresión, los enemigos en casillas de recursos pueden ser atacados o expulsados.</li>\n<li>Los días de guerra necesitan instrucciones claras. Si se lucha, se lucha con objetivos y horario. Si se respeta un acuerdo, hay que comunicarlo.</li>\n<li>Inactivos y no combatientes deben conocer las expectativas de escudo. Incluso con acuerdos, puede haber errores, externos o conflictos por recursos.</li>\n<li>La Ciudad Real durante Season 1 puede llegar a 0 °C durante Clash of Kingdoms, pero no es una solución permanente de calor para todo el reino.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-10-sala-de-clases-habilidades-y-reinicio\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>10. Sala de clases, habilidades y reinicio</h2><ul>\n<li>La Sala de clases y la experiencia de clase son sistemas importantes. La clase Arquitecto se discute por su utilidad en construcción, investigación y asedio.</li>\n<li>Algunas habilidades aumentan el daño a la durabilidad de la muralla de ciudad durante asedios. Importan más para ciudades que para golpes normales a monstruos.</li>\n<li>Habilidades como Marcha forzada o Estandarte de asedio tienen pruebas comunitarias mixtas. No inviertas mucho sin observar tu propio servidor.</li>\n<li>Las habilidades de nivel 15+ se desbloquearon en momentos distintos según servidor. Si una fila está bloqueada, puede ser fase del servidor, error o desbloqueo retrasado.</li>\n<li>El reinicio de habilidades de clase puede usarse estratégicamente. Las habilidades normales deberían seguir siendo útiles después de Season 1; las habilidades de temporada pueden reembolsarse o desaparecer.</li>\n<li>Cerca del final, considera mover puntos de habilidades temporales de temporada hacia habilidades normales de largo plazo como Investigación, Construcción y Producción de recursos.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-11-heroes-potenciadores-crystal-y-cambio-de-nivel\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>11. Héroes, potenciadores, Crystal y Cambio de nivel</h2><ul>\n<li>Los héroes con potenciador de temporada mencionados incluyen Crystal, Sera, Fenixia/Fenxia y Daphne. Merecen atención especial en planificación y recursos.</li>\n<li>Crystal es especialmente importante para jugadores free-to-play o de bajo gasto. Una Crystal de cinco estrellas puede convertirse en versión dorada S+, pero las estrellas posteriores requieren muchos fragmentos morados S+.</li>\n<li>Cambio de nivel solo intercambia niveles de EXP. No transfiere estrellas, ascensión, medallas ni niveles de habilidad. Si un héroe baja de nivel, algunas habilidades pueden bloquearse de nuevo.</li>\n<li>No uses Cambio de nivel apresuradamente en un héroe dorado nuevo sin estrellas. Alto nivel sin estrellas puede seguir siendo débil. Mejor juntar fragmentos y cambiar cuando el objetivo esté listo.</li>\n<li>El Arco del Mañana de Sera es equipo exclusivo. No reemplaza el equipo normal; añade habilidades y puede aumentar niveles máximos. Suele requerir Sera de cinco estrellas y fragmentos específicos de arco.</li>\n<li>El equipo exclusivo puede ser caro. El Mercado Negro / Festival de temporada puede dar acceso más lento después, según tienda y fase del servidor.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-12-ciudades-de-nivel-6-ciudad-real-y-final\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>12. Ciudades de nivel 6, Ciudad Real y final</h2><ul>\n<li>Las ciudades de nivel 6 son de las ciudades normales más importantes antes de la Ciudad Real. Pueden dar mucho valor de cristales y estar conectadas al acceso o influencia sobre la Ciudad Real.</li>\n<li>Si ciudades de nivel 6 ya están controladas por uniones fuertes, negociar puede ser más realista que usar fuerza directa. Acuerdos, ventanas cortas y recompensas coordinadas pueden importar.</li>\n<li>La semana 7 se trata como la fase decisiva de empuje final. Esperar a los últimos días es peligroso por protecciones, bloqueos de mapa o cambios de reglas.</li>\n<li>No pierdas una ciudad de nivel 6 tarde pensando que podrás recuperarla después. Varios servidores reportan ciudades y minas bloqueadas después de la temporada o después de la semana 7.</li>\n<li>La Ciudad Real da autoridad, recompensas, títulos o buffs, pero no necesariamente cristales de hielo. El Horno real calienta localmente, no todo el reino de forma permanente.</li>\n<li>El objetivo final práctico es conservar la mejor combinación realista de fábricas, ciudades útiles, minas heladas y accesos clave evitando pérdidas innecesarias.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-13-despues-de-season-1-y-mercado-negro\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>13. Después de Season 1 y Mercado Negro</h2><ul>\n<li>Después de Season 1 puede aparecer el Festival de temporada / Mercado Negro. Es una fase de recuperación y preparación.</li>\n<li>Monedas de oro negro, misiones de bingo y rotaciones de tienda pueden ser importantes. Prioriza crecimiento a largo plazo: fragmentos exclusivos, decoraciones, marcos, aceleradores y recursos de héroe.</li>\n<li>Algunos edificios o elementos del mapa pueden permanecer visual o funcionalmente durante un tiempo, mientras eventos específicos como Ola de frío, tesoros o Expedición terminan.</li>\n<li>Las reglas tras la temporada cambiaron entre grupos de servidores. No asumas que antiguas ventanas de recuperación siguen activas. Planifica como si la semana 7 fuera la última oportunidad fiable.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-14-lista-diaria-para-liderazgo\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>14. Lista diaria para liderazgo</h2><ul>\n<li>Revisar el calendario del evento antes de dar órdenes. Las reglas pueden cambiar por semana.</li>\n<li>Revisar estado del horno, donaciones de carbón/oro y cobertura de calor de jugadores activos.</li>\n<li>Confirmar que los intentos diarios de minas se usan en objetivos de ruta, no en territorio aislado.</li>\n<li>Coordinar declaraciones de ciudad y evitar abandonos accidentales, especialmente después de mitad de temporada.</li>\n<li>Controlar diplomacia: pactos de no agresión, casillas atacables, ventanas de recompensa acordadas.</li>\n<li>Recordar gasto inteligente de stamina entre minas, zombis, Arm Race, esqueletos, dragones, Nightfall y otros eventos.</li>\n<li>Preparar la semana 7: ciudades clave, minas de acceso, horarios enemigos, horno, líderes de rally y avisos de escudo.</li>\n</ul></article>\n<article class=\"chapter\" id=\"es-15-glosario-y-resumen-final\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>15. Glosario y resumen final</h2><ul>\n<li>Horno térmico: horno personal para calor del castillo y resistencia.</li>\n<li>Horno de unión: horno de alianza que calienta la zona y permite operar en áreas frías.</li>\n<li>Ola de frío: caída recurrente de temperatura que puede congelar castillos.</li>\n<li>Mina helada: territorio estacional para expansión, recompensas y cristales de hielo.</li>\n<li>Ciudad: territorio estacional como aldea, mansión, fábrica, pueblo o metrópolis/biblioteca de nivel 6.</li>\n<li>Cristales de hielo: recurso central de puntuación, ligado al territorio mantenido.</li>\n<li>Puesto avanzado: estructura de Expedición para iniciar expansión cross-server.</li>\n<li>Casilla de recursos: campo de recolección, tratado de forma diferente a ataques de castillo.</li>\n<li>Resumen final: Season 1 recompensa a uniones que se mantienen calientes, coordinan territorio, usan stamina con inteligencia, respetan acuerdos útiles y aseguran posiciones finales a tiempo.</li>\n</ul></article>", "br": "<article class=\"chapter\" id=\"br-1-proposito-e-hierarquia-das-fontes\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Propósito e hierarquia das fontes</h2><ul>\n<li>Este guia é um guia prático de liderança para X-Clash Temporada 1: Winter Is Coming / Polar Tempest. Ele serve para qualquer união e não é adaptado a um servidor específico.</li>\n<li>Hierarquia das fontes: material oficial de X-Clash / Strawberry tem a maior autoridade; Animality / Pioneer Test Group é forte evidência prática; criadores de guias e jogadores experientes são relatos úteis de campo; comentários isolados são pistas de menor confiança.</li>\n<li>Se o calendário do evento, a planilha oficial ou as regras atuais do jogo contradizem posts antigos do Discord, siga primeiro a informação atual dentro do jogo.</li>\n<li>O objetivo não é explicar cada botão, mas dar a líderes e jogadores ativos uma ordem útil de prioridades: calor, território, rota, diplomacia, stamina, recompensas e segurança no fim da temporada.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-2-temporada-1-em-uma-frase\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Temporada 1 em uma frase</h2><ul>\n<li>A Temporada 1 não é apenas uma temporada de combate. É uma temporada de logística, sobrevivência e controle territorial.</li>\n<li>As uniões mais fortes não são sempre as que mais atacam. São as que mantêm jogadores aquecidos, seguram minas e cidades úteis, usam stamina com eficiência, respeitam acordos úteis e preparam as semanas finais cedo.</li>\n<li>O princípio central é: ficar aquecido, expandir com propósito, segurar o que importa e não esperar a última semana para corrigir erros estratégicos.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-3-preparacao-antes-da-temporada\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Preparação antes da temporada</h2><ul>\n<li>Ensine os jogadores a posicionar seus castelos corretamente. A Temporada 1 exige castelos juntos dentro de zonas quentes; castelos espalhados congelam e perdem eficiência.</li>\n<li>Garanta que os jogadores entendam o ponto de rally / teleporte da união. Um deslocamento errado custa tempo e pode quebrar a cobertura de calor.</li>\n<li>Remova equipes da defesa da muralha antes de fases perigosas de guerra, salvo ordem contrária: Muralha do Castelo &gt; Defesa da Cidade &gt; desmarcar Entrar na defesa em cada equipe. Equipes na muralha podem permitir que inimigos drenem tropas.</li>\n<li>Guarde stamina. Minas de gelo, zumbis, monstros, esqueletos, dragões, lobos/tubarões Nightfall e eventos recorrentes disputam a mesma stamina.</li>\n<li>Guarde fragmentos roxos de herói S. Uma Crystal de 5 estrelas pode ser promovida durante a Temporada 1 para uma versão dourada S+, mas evoluir estrelas depois pode ficar caro.</li>\n<li>Espere bugs. Mecânicas da Temporada 1 mudaram entre grupos de servidores; calendário do evento e regras ao vivo devem ser verificados sempre.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-4-calor-congelamento-e-fornalhas\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Calor, congelamento e fornalhas</h2><ul>\n<li>Existem duas fornalhas importantes. A Fornalha Térmica pessoal ajuda o próprio castelo, resistência e capacidade de lutar ou conquistar. A Fornalha da União fornece calor aos castelos próximos e permite operar em áreas frias.</li>\n<li>A Onda de Frio é o perigo recorrente. Sem a fornalha pronta, castelos podem congelar e perder atividades importantes.</li>\n<li>Um castelo congelado ainda pode matar Zumbis de Gelo, coletar recursos, matar zumbis normais, saquear carroças, fazer algumas missões de inteligência, algumas tarefas da taverna, atacar o Chefe Mundial e se realocar.</li>\n<li>Um castelo congelado não pode fazer ações-chave como lutar contra Zumbis Elite, iniciar rallies ou participar do Chefe da União. Por isso calor e disciplina de fornalha são obrigatórios.</li>\n<li>A posição da Fornalha da União importa. Ela deve cobrir castelos ativos e áreas operacionais. Ao avançar para zonas frias, colocá-la perto ou dentro de cidades ocupadas úteis costuma ser melhor que colocar aleatoriamente.</li>\n<li>Cidades ocupadas dão calor local. Minas de Gelo não dão calor. O centro do mapa é mais frio que a borda, então entrar cedo demais pode causar problemas durante a Onda de Frio.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-5-posicao-do-castelo-e-terreno-contaminado\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Posição do castelo e terreno contaminado</h2><ul>\n<li>Castelos devem ficar dentro da área quente, perto do grupo da união e ao alcance prático da Fornalha da União.</li>\n<li>Evite terreno escuro ou contaminado ao redor de minas e cidades quando possível. Relatos indicam restrições e maior risco de ataque em comparação com terreno normal.</li>\n<li>No começo, muitas uniões ficam perto de aldeias nível 1 ou áreas de minas de gelo nível 2 porque a temperatura é mais fácil de controlar.</li>\n<li>Antes de mover a união inteira, aqueça jogadores-chave, confira cobertura da fornalha e diga claramente aos jogadores menores onde estacionar.</li>\n<li>Mover não é só decisão de teleporte. É decisão de calor, rally, defesa, stamina e atividade.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-6-minas-cidades-e-cristais-de-gelo\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Minas, cidades e cristais de gelo</h2><ul>\n<li>Minas de Gelo e cidades são a base de pontuação da Temporada 1. Capturar ajuda, mas segurar é o que conta para cristais de gelo.</li>\n<li>Notas oficiais e da comunidade indicam que o valor dos cristais depende do que a união segura, não apenas do que capturou uma vez. Abandonar território pode reduzir valor.</li>\n<li>A capacidade base de Minas de Gelo é frequentemente relatada como 3. Cada cidade ou aldeia adicional costuma aumentar a capacidade; cidades nível 6 podem dar mais, muitas vezes +2.</li>\n<li>Limites de cidades e minas variam por servidor de origem e fase cross-server. Relatos citam 4 cidades e 7 minas no servidor próprio e 4 cidades com limite maior de minas fora. Verifique sempre no menu Cidade da União e nas regras atuais.</li>\n<li>Primeira captura pode dar caixas de saque da união. A liderança deve distribuir de forma justa. Verifique se a mina ou cidade já tinha marca de primeira captura.</li>\n<li>Não abandone cidades ou minas importantes sem coordenação. Território é pontuação, acesso, controle de rota, planejamento de calor e força de negociação.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-7-planejamento-de-rota-e-expansao-inicial\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>7. Planejamento de rota e expansão inicial</h2><ul>\n<li>Não prenda uma rota perfeita antes da temporada abrir, pois a posição inicial pode só ficar clara quando o mapa começar.</li>\n<li>Assim que a união aparece no mapa, planeje rapidamente. A rota deve levar a minas valiosas, cidades úteis e depois áreas-chave.</li>\n<li>Se um chefe de Mina de Gelo for forte demais, não perca o dia todo. Mude para uma mina próxima de nível menor e mantenha a expansão andando.</li>\n<li>Minas de Gelo nem sempre precisam ser capturadas por ordem numérica, mas normalmente precisam tocar território próprio. Contato diagonal geralmente não basta; adjacência direta importa.</li>\n<li>Níveis de cidades abrem por tempo. No começo pode haver mais declarações; mais tarde elas podem ficar limitadas a dias como quarta e sábado.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-8-expedicao-do-reino-e-postos-avancados\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>8. Expedição do Reino e postos avançados</h2><ul>\n<li>A Expedição do Reino abre a fase cross-server. R4/R5 geralmente colocam postos avançados em outros servidores. Normalmente não se colocam postos no servidor próprio.</li>\n<li>Relatos divergem sobre mover postos avançados; trate a posição como importante e confira a interface atual antes de confirmar.</li>\n<li>Depois de colocar o posto, a primeira mina conectada costuma ser o ponto prático inicial. Depois a expansão segue por território adjacente.</li>\n<li>Quando a Expedição está aberta, muitas vezes é possível usar realocação grátis entrando e voltando corretamente. Jogadores inexperientes devem praticar para não gastar teleportes.</li>\n<li>Não invada às cegas. Trocas e diplomacia com outros servidores poupam tropas, pois Clash of Kingdoms e outros eventos continuam durante a Temporada 1.</li>\n<li>Cada união pode escolher seu alvo, e várias uniões podem pressionar o mesmo servidor. Diplomacia e timing valem mais que ataques emocionais.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-9-diplomacia-dias-de-guerra-e-tiles\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>9. Diplomacia, dias de guerra e tiles</h2><ul>\n<li>A Temporada 1 pode destruir tropas se castelos forem atacados sem propósito. Muitos servidores usam acordos para evitar ataques inúteis e preservar soldados.</li>\n<li>Coexistência é estratégia, não fraqueza. Se uniões trocam objetivos, dão janelas curtas de recompensa ou evitam queimar castelos, ambas podem avançar melhor.</li>\n<li>Tiles de recursos são diferentes de castelos. Se não houver pacto de não agressão, inimigos em tiles de recursos podem ser atacados ou expulsos.</li>\n<li>Dias de guerra exigem instruções claras. Se a união luta, luta com alvo e horário. Se respeita acordo, isso precisa ser comunicado.</li>\n<li>Inativos e não combatentes devem saber quando usar escudo. Mesmo com acordos, erros, terceiros ou conflitos de tiles podem acontecer.</li>\n<li>A Cidade Real durante a Temporada 1 pode chegar a 0 °C no Clash of Kingdoms, mas não é solução permanente de calor para todo o reino.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-10-salao-de-classes-habilidades-e-reset\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>10. Salão de Classes, habilidades e reset</h2><ul>\n<li>Salão de Classes e EXP de Classe são sistemas importantes. A classe Arquiteto é discutida por construção, pesquisa e utilidade em cerco.</li>\n<li>Algumas habilidades aumentam o dano à durabilidade da muralha da cidade durante cerco. Isso importa mais para cidades que para monstros comuns.</li>\n<li>Habilidades como Marcha Forçada ou Estandarte de Cerco têm testes comunitários mistos. Não invista pesado sem observar seu servidor.</li>\n<li>Habilidades nível 15+ abriram em momentos diferentes por servidor. Linha bloqueada pode ser estágio do servidor, bug ou liberação atrasada.</li>\n<li>Reset de habilidades de classe pode ser estratégico. Habilidades normais devem continuar úteis após a Temporada 1; habilidades de temporada podem ser reembolsadas ou desaparecer.</li>\n<li>Perto do fim, considere mover pontos de habilidades temporárias para habilidades normais de longo prazo como Pesquisa, Construção e Produção de recursos.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-11-herois-bonus-de-temporada-crystal-e-troca-de-nivel\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>11. Heróis, bônus de temporada, Crystal e Troca de Nível</h2><ul>\n<li>Heróis com bônus de temporada citados incluem Crystal, Sera, Fenixia/Fenxia e Daphne. Eles merecem atenção especial em planejamento e recursos.</li>\n<li>Crystal é importante para free-to-play e low spend. Uma Crystal 5 estrelas pode virar versão dourada S+, mas estrelas posteriores exigem muitos fragmentos roxos S+.</li>\n<li>Troca de Nível troca apenas níveis de EXP. Não transfere estrelas, ascensão, medalhas ou níveis de habilidade. Se um herói cair de nível, habilidades podem bloquear novamente.</li>\n<li>Não use Troca de Nível cedo demais em herói dourado sem estrelas. Alto nível sem estrelas pode ser fraco. Melhor juntar fragmentos e trocar quando o alvo ficar pronto.</li>\n<li>O Arco do Amanhã da Sera é equipamento exclusivo. Não substitui equipamento normal; adiciona habilidades e pode aumentar níveis máximos. Normalmente exige Sera 5 estrelas e fragmentos específicos do arco.</li>\n<li>Equipamento exclusivo pode ser caro. Mercado Negro / Festival da Temporada pode dar acesso mais lento depois, dependendo da loja e fase do servidor.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-12-cidades-nivel-6-cidade-real-e-final-de-temporada\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>12. Cidades nível 6, Cidade Real e final de temporada</h2><ul>\n<li>Cidades nível 6 são das cidades normais mais importantes antes da Cidade Real. Podem dar muitos cristais e estar ligadas ao acesso ou influência na Cidade Real.</li>\n<li>Se cidades nível 6 já estão com uniões fortes, negociação pode ser mais realista que força direta. Acordos, janelas curtas e recompensas coordenadas importam.</li>\n<li>A semana 7 é tratada como fase decisiva de empurrão final. Esperar os últimos dias é perigoso por proteções, bloqueios de mapa ou mudanças de regras.</li>\n<li>Não perca uma cidade nível 6 tarde achando que recupera depois. Vários servidores relatam cidades e minas bloqueadas após a temporada ou após semana 7.</li>\n<li>A Cidade Real dá autoridade, recompensas, títulos ou buffs, mas não necessariamente cristais. A Fornalha Real aquece localmente, não o reino inteiro.</li>\n<li>O objetivo final prático é segurar a melhor combinação realista de fábricas, cidades úteis, Minas de Gelo e acessos-chave, evitando perdas inúteis.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-13-apos-a-temporada-1-e-mercado-negro\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>13. Após a Temporada 1 e Mercado Negro</h2><ul>\n<li>Após a Temporada 1 pode surgir Festival da Temporada / Mercado Negro. É fase de recuperação e preparação.</li>\n<li>Moedas de Ouro Negro, missões de bingo e rotação de loja podem ser importantes. Priorize crescimento longo: fragmentos exclusivos, decorações, molduras, aceleradores e recursos de herói.</li>\n<li>Alguns prédios ou elementos de mapa podem continuar visíveis ou funcionais por um tempo, enquanto eventos específicos como Onda de Frio, tesouros ou Expedição terminam.</li>\n<li>Regras pós-temporada mudaram entre servidores. Não assuma que antigas janelas de reconquista funcionam. Planeje como se a semana 7 fosse a última chance confiável.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-14-checklist-diario-da-lideranca\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>14. Checklist diário da liderança</h2><ul>\n<li>Verificar calendário do evento antes de dar ordens. Regras podem mudar por semana.</li>\n<li>Verificar fornalha, doações de carvão/ouro e cobertura de calor dos ativos.</li>\n<li>Confirmar que tentativas diárias de minas seguem a rota, não territórios isolados.</li>\n<li>Coordenar declarações de cidades e evitar abandonos acidentais, principalmente após metade da temporada.</li>\n<li>Controlar diplomacia: pactos de não agressão, tiles atacáveis e janelas de recompensa.</li>\n<li>Lembrar uso inteligente de stamina entre minas, zumbis, Arm Race, esqueletos, dragões, Nightfall e outros eventos.</li>\n<li>Preparar semana 7: cidades-chave, minas de acesso, horários inimigos, fornalha, líderes de rally e lembretes de escudo.</li>\n</ul></article>\n<article class=\"chapter\" id=\"br-15-glossario-e-resumo-final\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>15. Glossário e resumo final</h2><ul>\n<li>Fornalha Térmica: fornalha pessoal para calor do castelo e resistência.</li>\n<li>Fornalha da União: fornalha da aliança que aquece a área e permite operar em zonas frias.</li>\n<li>Onda de Frio: queda recorrente de temperatura que pode congelar castelos.</li>\n<li>Mina de Gelo: território sazonal para expansão, recompensas e cristais.</li>\n<li>Cidade: território sazonal como aldeia, mansão, fábrica, cidade ou metrópole/biblioteca nível 6.</li>\n<li>Cristais de Gelo: recurso central de pontuação ligado ao território mantido.</li>\n<li>Posto avançado: estrutura da Expedição para iniciar expansão cross-server.</li>\n<li>Tile: campo de coleta, normalmente tratado diferente de ataques a castelo.</li>\n<li>Resumo final: a Temporada 1 recompensa uniões que ficam aquecidas, coordenam território, usam stamina bem, respeitam acordos úteis e seguram posições finais cedo.</li>\n</ul></article>", "fr": "<article class=\"chapter\" id=\"fr-1-objectif-et-hierarchie-des-sources\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Objectif et hiérarchie des sources</h2><ul>\n<li>Ce guide est un guide pratique de leadership pour X-Clash Saison 1: Winter Is Coming / Polar Tempest. Il peut être utilisé par toute union et n’est pas lié à un serveur précis.</li>\n<li>Hiérarchie des sources : les informations officielles X-Clash / Strawberry sont prioritaires; Animality / Pioneer Test Group est une preuve pratique forte; les créateurs de guides et joueurs expérimentés sont des retours utiles; les commentaires isolés restent des indices moins sûrs.</li>\n<li>Si le calendrier d’événement, le tableau officiel ou les règles en jeu contredisent d’anciens messages Discord, suivez toujours d’abord l’information actuelle en jeu.</li>\n<li>L’objectif est de donner un ordre de priorités utile : chaleur, territoire, route, diplomatie, endurance, récompenses et sécurité de fin de saison.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-2-la-saison-1-en-une-phrase\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. La Saison 1 en une phrase</h2><ul>\n<li>La Saison 1 n’est pas seulement une saison de combat. C’est une saison de logistique, survie et contrôle territorial.</li>\n<li>Les meilleures unions ne sont pas forcément celles qui attaquent le plus, mais celles qui gardent leurs joueurs au chaud, tiennent mines et villes utiles, dépensent l’endurance intelligemment, respectent les accords utiles et préparent tôt la fin de saison.</li>\n<li>Principe central : rester au chaud, s’étendre avec un but, garder ce qui compte et ne pas attendre la dernière semaine pour corriger les erreurs.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-3-preparation-avant-la-saison\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Préparation avant la saison</h2><ul>\n<li>Apprenez aux joueurs à placer correctement leur château dans les zones chaudes. Les châteaux dispersés gèlent plus vite et deviennent inefficaces.</li>\n<li>Les joueurs doivent comprendre le point de ralliement et le téléport d’union. Un déplacement mal fait coûte du temps et peut casser la couverture de chaleur.</li>\n<li>Retirez les équipes de la défense du mur avant les phases dangereuses, sauf ordre contraire : Mur du château &gt; Défense de ville &gt; décocher Rejoindre la défense. Sinon l’ennemi peut drainer les troupes.</li>\n<li>Économisez l’endurance. Mines gelées, zombies, monstres, squelettes, dragons, loups/requins Nightfall et événements récurrents utilisent tous cette ressource.</li>\n<li>Gardez les fragments violets de héros S. Crystal 5 étoiles peut devenir une version dorée S+ pendant la Saison 1, mais les étoiles suivantes coûtent cher.</li>\n<li>Attendez-vous à des bugs. Les règles ont changé selon les groupes de serveurs; vérifiez souvent le calendrier et les règles actuelles.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-4-chaleur-gel-et-fourneaux\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Chaleur, gel et fourneaux</h2><ul>\n<li>Il existe deux fourneaux importants. Le Fourneau thermique personnel soutient votre château, la résistance et la capacité à combattre ou conquérir. Le Fourneau d’union chauffe les châteaux proches et aide l’union en zones froides.</li>\n<li>Le Coup de froid est le danger récurrent. Sans fourneau prêt, les châteaux peuvent geler et perdre des activités importantes.</li>\n<li>Un château gelé peut encore tuer des zombies gelés, récolter, tuer des zombies normaux, piller des chariots, faire certaines missions d’intelligence, certaines tâches de taverne, attaquer le Boss mondial et se déplacer.</li>\n<li>Un château gelé ne peut pas combattre les zombies élite, lancer des ralliements ou participer au Boss d’union. La discipline de chaleur est donc obligatoire.</li>\n<li>Le placement du Fourneau d’union est crucial : il doit couvrir les joueurs actifs et les zones utiles. En avançant, le placer près ou dans une ville occupée utile est souvent meilleur.</li>\n<li>Les villes occupées donnent de la chaleur locale. Les mines gelées ne donnent pas de chaleur. Le centre de la carte est plus froid que l’extérieur.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-5-placement-des-chateaux-et-terrain-contamine\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Placement des châteaux et terrain contaminé</h2><ul>\n<li>Placez les châteaux dans la zone chaude, près du groupe et à portée pratique du Fourneau d’union.</li>\n<li>Évitez le terrain sombre ou contaminé autour des mines et villes si possible; il peut apporter des restrictions et plus de risque.</li>\n<li>Au début, beaucoup d’unions restent près des villages niveau 1 ou mines gelées niveau 2 car la température est plus facile à gérer.</li>\n<li>Avant un grand déplacement, chauffez les joueurs clés, vérifiez la couverture du fourneau et indiquez aux plus faibles où se placer.</li>\n<li>Un déplacement n’est pas seulement un téléport : c’est une décision de chaleur, ralliement, défense, endurance et activité.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-6-mines-villes-et-cristaux-de-glace\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Mines, villes et cristaux de glace</h2><ul>\n<li>Les mines gelées et villes sont la base du score. Capturer aide, mais tenir compte pour les cristaux de glace.</li>\n<li>Les notes officielles et communautaires indiquent que la valeur dépend de ce que l’union détient, pas seulement de ce qu’elle a capturé. Abandonner peut réduire la valeur.</li>\n<li>La capacité de base des mines gelées est souvent 3. Chaque ville ou village ajoute souvent de la capacité; une ville niveau 6 peut donner davantage, souvent +2.</li>\n<li>Les limites varient selon serveur d’origine et phase inter-serveurs. Vérifiez toujours le menu Ville d’union et les règles actuelles.</li>\n<li>La première capture peut donner des coffres d’union; ils doivent être distribués équitablement. Vérifiez le tag de première capture.</li>\n<li>N’abandonnez pas mines ou villes importantes sans coordination. Le territoire donne score, accès, route, chaleur et pouvoir de négociation.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-7-route-et-expansion-precoce\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>7. Route et expansion précoce</h2><ul>\n<li>Ne bloquez pas une route parfaite avant l’ouverture, car le point de départ peut être inconnu.</li>\n<li>Après l’apparition sur la carte, choisissez vite une route vers mines précieuses, villes utiles et zones clés.</li>\n<li>Si un boss de mine gelée est trop fort, ne perdez pas la journée; pivotez vers une mine proche plus basse.</li>\n<li>Les mines ne doivent pas toujours être prises par ordre numérique, mais elles doivent généralement toucher votre territoire; la diagonale ne suffit pas.</li>\n<li>Les villes s’ouvrent par paliers de temps. Plus tard, les déclarations peuvent être limitées à mercredi et samedi.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-8-expedition-du-royaume-et-avant-postes\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>8. Expédition du Royaume et avant-postes</h2><ul>\n<li>L’Expédition du Royaume ouvre la phase inter-serveurs. Les R4/R5 placent les avant-postes sur d’autres serveurs; normalement pas sur le serveur d’origine.</li>\n<li>Les retours divergent sur le déplacement des avant-postes; considérez donc le placement comme important et vérifiez l’interface.</li>\n<li>Après placement, la première mine reliée sert souvent de départ pratique, puis l’expansion suit les terres adjacentes.</li>\n<li>L’Expédition permet souvent une relocalisation gratuite si elle est utilisée correctement; les joueurs inexpérimentés doivent s’entraîner.</li>\n<li>N’envahissez pas aveuglément. Commerce et diplomatie économisent des troupes, car Clash of Kingdoms et autres événements continuent.</li>\n<li>Chaque union peut choisir sa cible et plusieurs unions peuvent viser le même serveur; timing et diplomatie valent plus que la colère.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-9-diplomatie-jours-de-guerre-et-cases-de-ressources\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>9. Diplomatie, jours de guerre et cases de ressources</h2><ul>\n<li>La Saison 1 peut détruire les troupes si les châteaux sont attaqués sans but. Beaucoup de serveurs évitent ces attaques par accord.</li>\n<li>La coexistence est une stratégie. Échanger des objectifs, donner de courtes fenêtres de récompense ou éviter de brûler les châteaux peut aider les deux camps.</li>\n<li>Les cases de ressources sont différentes des châteaux. Sans pacte de non-agression, les ennemis sur ressources peuvent souvent être chassés.</li>\n<li>Les jours de guerre exigent des ordres clairs : si l’on combat, on combat avec cible et horaire; si un accord existe, on le communique.</li>\n<li>Les inactifs et non-combattants doivent connaître les attentes de bouclier; les erreurs et conflits de ressources arrivent.</li>\n<li>La Ville royale peut être à 0 °C pendant Clash of Kingdoms, mais ce n’est pas une solution de chaleur permanente pour tout le royaume.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-10-salle-de-classe-competences-et-reinitialisation\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>10. Salle de classe, compétences et réinitialisation</h2><ul>\n<li>La Salle de classe et l’expérience de classe sont importantes. Architecte est discuté pour construction, recherche et siège.</li>\n<li>Certaines compétences augmentent les dégâts à la durabilité du mur de ville pendant les sièges.</li>\n<li>Marche forcée ou Bannière de siège ont des résultats de tests mitigés; n’investissez pas aveuglément.</li>\n<li>Les compétences niveau 15+ se débloquent différemment selon serveur; une ligne bloquée peut être phase, bug ou délai.</li>\n<li>La réinitialisation peut être stratégique. Les compétences normales restent utiles après S1; les compétences saisonnières peuvent être remboursées ou disparaître.</li>\n<li>Vers la fin, déplacez éventuellement les points vers Recherche, Construction et Production de ressources.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-11-heros-bonus-de-saison-crystal-et-echange-de-niveau\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>11. Héros, bonus de saison, Crystal et échange de niveau</h2><ul>\n<li>Les héros à bonus cités sont Crystal, Sera, Fenixia/Fenxia et Daphne.</li>\n<li>Crystal est importante pour F2P/low spend : à 5 étoiles, elle peut devenir dorée S+, mais les étoiles suivantes coûtent beaucoup de fragments violets S+.</li>\n<li>L’échange de niveau ne change que l’EXP. Il ne transfère pas étoiles, ascension, médailles ou compétences; certaines compétences peuvent se verrouiller si le niveau baisse.</li>\n<li>N’utilisez pas l’échange trop tôt sur un héros doré sans étoiles. Collectez les fragments puis échangez quand il peut être prêt au combat.</li>\n<li>L’Arc de d
