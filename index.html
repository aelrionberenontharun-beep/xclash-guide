emain de Sera est un équipement exclusif qui s’ajoute à l’équipement normal, ajoute des compétences et peut augmenter les niveaux max. Il exige souvent Sera 5 étoiles et des fragments spécifiques.</li>\n<li>L’équipement exclusif peut être cher; le Marché noir / Festival peut donner accès plus lentement selon serveur.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-12-villes-niveau-6-ville-royale-et-fin-de-saison\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>12. Villes niveau 6, Ville royale et fin de saison</h2><ul>\n<li>Les villes niveau 6 sont parmi les plus importantes avant la Ville royale; elles peuvent donner beaucoup de cristaux et influencer l’accès royal.</li>\n<li>Si elles sont déjà contrôlées par des unions fortes, la négociation peut être plus réaliste que la force.</li>\n<li>La semaine 7 est souvent la phase décisive. Attendre la fin est dangereux à cause des protections, verrous de carte ou changements.</li>\n<li>Ne perdez pas une ville niveau 6 tard en pensant la récupérer après; plusieurs serveurs ont vu mines et villes verrouillées.</li>\n<li>La Ville royale donne autorité, récompenses, titres ou bonus, mais pas forcément des cristaux. Le Fourneau royal chauffe localement.</li>\n<li>But final : garder la meilleure combinaison réaliste de fabriques, villes utiles, mines gelées et accès clés en évitant les pertes inutiles.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-13-apres-la-saison-1-et-marche-noir\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>13. Après la Saison 1 et Marché noir</h2><ul>\n<li>Après S1 peut venir le Festival / Marché noir, phase de récupération et préparation.</li>\n<li>Pièces d’or noir, quêtes bingo et boutique deviennent importantes. Priorisez fragments exclusifs, décorations, cadres, accélérations et ressources héros.</li>\n<li>Certains bâtiments ou éléments peuvent rester, tandis que Coup de froid, trésors ou Expédition finissent.</li>\n<li>Les règles d’après-saison changent selon serveur; planifiez comme si la semaine 7 était la dernière correction fiable.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-14-liste-quotidienne-du-leadership\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>14. Liste quotidienne du leadership</h2><ul>\n<li>Vérifier le calendrier avant les ordres.</li>\n<li>Contrôler fourneau, dons charbon/or et couverture de chaleur.</li>\n<li>S’assurer que les prises de mines servent la route.</li>\n<li>Coordonner les déclarations et éviter les abandons accidentels.</li>\n<li>Suivre diplomatie, pactes et cases de ressources.</li>\n<li>Rappeler l’usage intelligent de l’endurance entre mines, zombies, Arm Race, squelettes, dragons, Nightfall et événements.</li>\n<li>Préparer semaine 7 : villes clés, mines d’accès, horaires ennemis, fourneau, chefs de ralliement et boucliers.</li>\n</ul></article>\n<article class=\"chapter\" id=\"fr-15-glossaire-et-resume-final\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>15. Glossaire et résumé final</h2><ul>\n<li>Fourneau thermique : fourneau personnel pour chaleur et résistance.</li>\n<li>Fourneau d’union : fourneau d’alliance chauffant la zone.</li>\n<li>Coup de froid : chute de température qui peut geler les châteaux.</li>\n<li>Mine gelée : territoire saisonnier pour expansion, récompenses et cristaux.</li>\n<li>Ville : village, manoir, fabrique, ville ou métropole/bibliothèque niveau 6.</li>\n<li>Cristaux de glace : ressource centrale liée au territoire détenu.</li>\n<li>Avant-poste : structure d’Expédition pour expansion inter-serveurs.</li>\n<li>Case de ressources : zone de récolte traitée différemment d’un château.</li>\n<li>Résumé : S1 récompense chaleur, coordination, bonne endurance, accords utiles et positions finales sécurisées tôt.</li>\n</ul></article>", "gr": "<article class=\"chapter\" id=\"gr-1-section\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Σκοπός και ιεράρχηση πηγών</h2><ul>\n<li>Αυτός ο οδηγός είναι πρακτικός οδηγός ηγεσίας για το X-Clash Season 1: Winter Is Coming / Polar Tempest. Είναι χρήσιμος για κάθε ένωση και όχι για έναν συγκεκριμένο server.</li>\n<li>Ιεράρχηση πηγών: επίσημο X-Clash / Strawberry πρώτα, Animality / Pioneer Test Group ως ισχυρή πρακτική ένδειξη, έμπειροι guide contributors ως χρήσιμες αναφορές, μεμονωμένα σχόλια ως χαμηλότερη βεβαιότητα.</li>\n<li>Αν το event calendar, το επίσημο spreadsheet ή οι τρέχοντες κανόνες διαφωνούν με παλιά Discord posts, ακολουθούμε πάντα το παιχνίδι και το επίσημο υλικό.</li>\n<li>Στόχος είναι να δοθεί σειρά προτεραιοτήτων: θερμότητα, territory, route, diplomacy, stamina, rewards και endgame security.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-2-season-1\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Season 1 σε μία φράση</h2><ul>\n<li>Η Season 1 δεν είναι μόνο combat season. Είναι logistics, survival και territory-control season.</li>\n<li>Οι δυνατότερες ενώσεις δεν είναι πάντα όσες χτυπούν περισσότερο, αλλά όσες κρατούν τους παίκτες ζεστούς, κρατούν χρήσιμα mines/cities, ξοδεύουν stamina σωστά, σέβονται χρήσιμες συμφωνίες και προετοιμάζουν νωρίς το τέλος.</li>\n<li>Κεντρική αρχή: μείνετε ζεστοί, επεκταθείτε με σκοπό, κρατήστε ό,τι αξίζει και μη περιμένετε την τελευταία εβδομάδα για διορθώσεις.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-3-section\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Προετοιμασία πριν την έναρξη</h2><ul>\n<li>Οι παίκτες πρέπει να μάθουν σωστό castle parking μέσα σε warm zones. Διάσπαρτα castles παγώνουν και γίνονται αναποτελεσματικά.</li>\n<li>Πρέπει να κατανοηθεί το rally point / union teleport. Λάθος relocation κοστίζει χρόνο και heat coverage.</li>\n<li>Αφαιρέστε teams από castle wall defense πριν από επικίνδυνες φάσεις, εκτός αν δοθεί άλλη οδηγία: Castle Wall &gt; City Defense &gt; uncheck Join the defense. Αλλιώς ο εχθρός μπορεί να στραγγίξει troops.</li>\n<li>Κρατήστε stamina. Frost Mines, zombies, monsters, skeletons, dragons, Nightfall wolves/sharks και recurring events χρησιμοποιούν την ίδια stamina.</li>\n<li>Κρατήστε purple S hero shards. Crystal 5 αστέρων μπορεί στη S1 να γίνει gold S+, αλλά το star-up μετά κοστίζει πολύ.</li>\n<li>Περιμένετε bugs και αλλαγές. Ελέγχετε event calendar και τρέχοντες κανόνες συχνά.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-4-section\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Θερμότητα, πάγωμα και φούρνοι</h2><ul>\n<li>Υπάρχουν δύο βασικοί φούρνοι: Personal Thermal Furnace για το δικό σας castle/resistance και Union Furnace που ζεσταίνει castles στην περιοχή.</li>\n<li>Cold Snap είναι επαναλαμβανόμενος κίνδυνος. Χωρίς έτοιμο furnace, castles παγώνουν και χάνουν σημαντικές δράσεις.</li>\n<li>Frozen castle μπορεί ακόμα να κάνει Frost Zombies, farming, normal zombies, wagon plunder, μερικά intelligence/tavern tasks, World Boss και relocation.</li>\n<li>Frozen castle δεν μπορεί να κάνει Elite Zombies, rallies ή Union Boss. Γι’ αυτό heat discipline είναι υποχρεωτικό.</li>\n<li>Union Furnace placement πρέπει να καλύπτει ενεργά castles και επιχειρησιακές ζώνες. Όταν κινείστε πιο βαθιά, θέση κοντά/μέσα σε occupied city είναι συχνά καλύτερη.</li>\n<li>Occupied cities δίνουν τοπική θερμότητα. Frost Mines δεν δίνουν heat. Το εσωτερικό map είναι πιο κρύο από το εξωτερικό.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-5-section\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Τοποθέτηση κάστρου και μολυσμένο έδαφος</h2><ul>\n<li>Τα castles πρέπει να μπαίνουν μέσα στη warm area, κοντά στο group και σε πρακτική εμβέλεια του Union Furnace.</li>\n<li>Αποφύγετε dark/contaminated land γύρω από mines/cities αν γίνεται, γιατί μπορεί να φέρει restrictions και μεγαλύτερο κίνδυνο.</li>\n<li>Νωρίς, πολλές ενώσεις μένουν κοντά σε level 1 villages ή level 2 Frost Mine areas για πιο εύκολη θερμοκρασία.</li>\n<li>Πριν μετακινηθεί όλη η ένωση, ζεστάνετε key players, ελέγξτε furnace coverage και εξηγήστε στους μικρότερους πού να σταθούν.</li>\n<li>Relocation δεν είναι μόνο teleport: είναι heat, rally, defense, stamina και activity decision.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-6-mines-cities-ice-crystals\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Mines, cities και Ice Crystals</h2><ul>\n<li>Frost Mines και cities είναι βάση scoring. Capture βοηθά, αλλά holding μετρά για Ice Crystals.</li>\n<li>Οι πληροφορίες δείχνουν ότι η αξία βασίζεται σε ό,τι κρατά η ένωση, όχι απλώς σε ό,τι κατέλαβε. Abandon μπορεί να μειώσει αξία.</li>\n<li>Base Frost Mine capacity συχνά αναφέρεται ως 3. Κάθε city/village αυξάνει capacity, ενώ level 6 cities συχνά δίνουν +2.</li>\n<li>City/mine limits διαφέρουν ανά home server και cross-server phase. Ελέγχετε πάντα Union City και event rules.</li>\n<li>First capture μπορεί να δώσει union loot boxes. Να μοιράζονται δίκαια και να ελέγχεται αν υπήρχε ήδη first-capture tag.</li>\n<li>Μην εγκαταλείπετε σημαντικά mines/cities χωρίς συντονισμό. Territory είναι score, access, route, heat planning και negotiation power.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-7-route-planning-early-expansion\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>7. Route planning και early expansion</h2><ul>\n<li>Μη σχεδιάζετε τέλεια route πριν ανοίξει η season, γιατί το starting location μπορεί να φανεί μόνο τότε.</li>\n<li>Μόλις ξεκινήσει, αποφασίστε route προς valuable mines, useful cities και key areas.</li>\n<li>Αν Frost Mine boss είναι πολύ δυνατός, μη χάνετε όλη τη μέρα. Pivot σε χαμηλότερο κοντινό mine.</li>\n<li>Frost Mines δεν χρειάζεται πάντα να είναι αριθμητικά, αλλά πρέπει συνήθως να ακουμπούν δικό σας land. Diagonal δεν αρκεί.</li>\n<li>City levels ανοίγουν με time gates. Αργότερα declarations συχνά περιορίζονται σε Wednesday/Saturday.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-8-kingdom-expedition-outposts\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>8. Kingdom Expedition και outposts</h2><ul>\n<li>Kingdom Expedition ανοίγει cross-server phase. R4/R5 βάζουν outposts σε άλλους servers, συνήθως όχι στον home server.</li>\n<li>Υπάρχουν διαφορετικές αναφορές για move outpost, άρα η τοποθέτηση πρέπει να θεωρείται σοβαρή και να ελέγχεται στο event interface.</li>\n<li>Μετά το outpost, το πρώτο connected mine γίνεται πρακτικό start point και μετά επέκταση με adjacent land.</li>\n<li>Με Expedition μπορεί συχνά να γίνει free relocation αν χρησιμοποιηθεί σωστά. Οι άπειροι πρέπει να εξασκηθούν για να μη σπαταλήσουν teleports.</li>\n<li>Μην εισβάλλετε τυφλά. Trade και diplomacy σώζουν troops, γιατί CoK και άλλα events συνεχίζουν.</li>\n<li>Κάθε ένωση μπορεί να διαλέξει στόχο και πολλές ενώσεις μπορούν να πιέσουν τον ίδιο server. Diplomacy και timing αξίζουν περισσότερο από θυμό.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-9-diplomacy-war-days-resource-tiles\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>9. Diplomacy, war days και resource tiles</h2><ul>\n<li>Η S1 μπορεί να καταστρέψει troops αν castles χτυπιούνται χωρίς σκοπό. Πολλοί servers κάνουν agreements για αποφυγή άχρηστων castle attacks.</li>\n<li>Coexistence είναι strategy, όχι weakness. Αν unions ανταλλάσσουν objectives ή short reward windows, όλοι προχωρούν καλύτερα.</li>\n<li>Resource tiles διαφέρουν από castles. Χωρίς non-aggression agreement, enemies on tiles μπορούν συχνά να χτυπηθούν.</li>\n<li>War days θέλουν καθαρές οδηγίες: αν πολεμάμε, πολεμάμε με στόχο και χρόνο· αν υπάρχει agreement, το ανακοινώνουμε.</li>\n<li>Inactives/non-fighters πρέπει να ξέρουν shield expectations. Ακόμα και με agreements συμβαίνουν λάθη ή tile conflicts.</li>\n<li>Royal City μπορεί να γίνει 0 °C στο CoK, αλλά δεν είναι μόνιμη λύση θερμότητας για όλο το kingdom.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-10-class-hall-skills-reset\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>10. Class Hall, skills και reset</h2><ul>\n<li>Class Hall και Class EXP είναι σημαντικά. Architect class συζητείται για building, research και siege utility.</li>\n<li>Κάποια skills αυξάνουν city wall durability damage κατά city siege.</li>\n<li>Forced March ή Siege Banner έχουν mixed reports. Μην επενδύετε τυφλά χωρίς server testing.</li>\n<li>Level 15+ skills ξεκλειδώνουν διαφορετικά ανά server. Locked row μπορεί να είναι stage, bug ή delay.</li>\n<li>Class skill reset μπορεί να είναι στρατηγικό. Normal skills μένουν χρήσιμα μετά τη S1, Season skills μπορεί να refund/εξαφανιστούν.</li>\n<li>Προς το τέλος, μετακινήστε πόντους σε Research, Building και Resource Production αν ταιριάζει στους στόχους.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-11-heroes-season-boosts-crystal-level-swap\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>11. Heroes, Season Boosts, Crystal και Level Swap</h2><ul>\n<li>Season Boost heroes: Crystal, Sera, Fenixia/Fenxia, Daphne.</li>\n<li>Crystal είναι σημαντική για F2P/low spend. Crystal 5 αστέρων μπορεί να γίνει gold S+, αλλά μετά χρειάζεται πολλά purple S+ shards.</li>\n<li>Level Swap αλλάζει μόνο EXP levels. Δεν μεταφέρει stars, ascension, medals ή skills. Αν πέσει level, skills μπορεί να lock.</li>\n<li>Μην κάνετε swap νωρίς σε νέο gold hero χωρίς stars. Μαζέψτε shards πρώτα και swap όταν γίνεται battle-ready.</li>\n<li>Sera’s Bow of Tomorrow είναι exclusive gear που προσθέτει skills και αυξάνει max skill levels, χωρίς να αντικαθιστά normal gear. Συνήθως θέλει 5-star Sera και specific bow shards.</li>\n<li>Exclusive gear μπορεί να είναι ακριβό· Black Market / Season Festival ίσως δώσει πιο αργή πρόσβαση.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-12-level-6-cities-royal-city-endgame\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>12. Level 6 cities, Royal City και endgame</h2><ul>\n<li>Level 6 cities είναι από τις πιο σημαντικές normal cities πριν Royal City και μπορούν να δίνουν πολλά Ice Crystals/access.</li>\n<li>Αν τα κρατούν ισχυρές ενώσεις, negotiation μπορεί να είναι πιο ρεαλιστικό από force.</li>\n<li>Week 7 θεωρείται decisive endgame push. Τα τελευταία days είναι επικίνδυνα λόγω shields, map locks ή rule changes.</li>\n<li>Μη χάσετε level 6 city αργά πιστεύοντας ότι θα την πάρετε μετά· πολλοί servers αναφέρουν locks.</li>\n<li>Royal City δίνει authority/rewards/titles/buffs, αλλά όχι απαραίτητα Ice Crystals. Royal Furnace θερμαίνει τοπικά.</li>\n<li>Τελικός στόχος: καλύτερος ρεαλιστικός συνδυασμός factories, useful cities, Frost Mines και access points χωρίς άχρηστες απώλειες.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-13-season-1-black-market\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>13. Μετά τη Season 1 και Black Market</h2><ul>\n<li>Μετά τη S1 μπορεί να έρθει Season Festival / Black Market ως recovery/prep phase.</li>\n<li>Black Gold Coins, bingo quests και shop rotations είναι σημαντικά. Prioritize exclusive shards, decorations, frames, speedups και hero resources.</li>\n<li>Κάποια seasonal buildings/map elements μένουν, ενώ Cold Snap, treasures ή Expedition τελειώνουν.</li>\n<li>Rules after season άλλαξαν ανά server. Plan as if Week 7 is the last reliable chance.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-14-daily-leadership-checklist\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>14. Daily leadership checklist</h2><ul>\n<li>Check event calendar πριν orders.</li>\n<li>Check furnace, coal/gold donations και heat coverage.</li>\n<li>Use mine attempts σε route targets, όχι random land.</li>\n<li>Coordinate city declarations και avoid accidental drops.</li>\n<li>Track diplomacy, NAPs, tile rules και reward windows.</li>\n<li>Remind stamina balance ανάμεσα σε mines, zombies, Arm Race, skeletons, dragons, Nightfall και άλλα events.</li>\n<li>Prepare Week 7: key cities, access mines, enemy timing, furnace, rally leaders, shields.</li>\n</ul></article>\n<article class=\"chapter\" id=\"gr-15-section\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>15. Γλωσσάρι και τελική σύνοψη</h2><ul>\n<li>Thermal Furnace: προσωπικός φούρνος για heat/resistance.</li>\n<li>Union Furnace: φούρνος ένωσης που ζεσταίνει περιοχή.</li>\n<li>Cold Snap: πτώση θερμοκρασίας που παγώνει castles.</li>\n<li>Frost Mine: seasonal mine territory για expansion/rewards/Ice Crystals.</li>\n<li>City: village, manor, factory, town ή level 6 metropolis/library.</li>\n<li>Ice Crystals: βασικός scoring πόρος δεμένος με held territory.</li>\n<li>Outpost: structure για cross-server expansion.</li>\n<li>Tile: resource field, διαφορετικό από castle attack.</li>\n<li>Σύνοψη: S1 ανταμείβει θερμότητα, coordination, σωστή stamina, χρήσιμες συμφωνίες και έγκαιρο endgame.</li>\n</ul></article>", "ro": "<article class=\"chapter\" id=\"ro-1-scop-si-ierarhia-surselor\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Scop și ierarhia surselor</h2><ul>\n<li>Acest ghid este un ghid practic de leadership pentru X-Clash Sezonul 1: Winter Is Coming / Polar Tempest. Este util pentru orice uniune, nu pentru un singur server.</li>\n<li>Ierarhia surselor: materialul oficial X-Clash / Strawberry are prioritate; Animality / Pioneer Test Group este dovadă practică puternică; creatorii de ghiduri și jucătorii experimentați sunt rapoarte utile; comentariile izolate sunt indicii mai puțin sigure.</li>\n<li>Dacă calendarul evenimentului, tabelul oficial sau regulile actuale contrazic postări vechi de Discord, urmați mai întâi informația din joc.</li>\n<li>Scopul este ordinea priorităților: căldură, teritoriu, rută, diplomație, stamina, recompense și siguranță de final.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-2-sezonul-1-intr-o-fraza\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Sezonul 1 într-o frază</h2><ul>\n<li>Sezonul 1 nu este doar combat. Este logistică, supraviețuire și control teritorial.</li>\n<li>Cele mai puternice uniuni nu atacă mereu cel mai mult; ele își țin jucătorii la cald, păstrează mine și orașe utile, folosesc stamina eficient și pregătesc finalul din timp.</li>\n<li>Principiul: rămâneți la cald, extindeți-vă cu scop, păstrați ce contează și nu așteptați ultima săptămână pentru greșeli strategice.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-3-pregatire-inainte-de-sezon\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Pregătire înainte de sezon</h2><ul>\n<li>Învățați jucătorii să plaseze corect castelele în zone calde. Castelele risipite îngheață și devin ineficiente.</li>\n<li>Jucătorii trebuie să înțeleagă punctul de rally / teleportarea uniunii. O relocare greșită costă timp și acoperire termică.</li>\n<li>Scoateți echipele de pe apărarea zidului înainte de faze periculoase: Castle Wall &gt; City Defense &gt; debifați Join the defense. Altfel inamicii pot consuma trupele.</li>\n<li>Economisiți stamina. Frost Mines, zombi, monștri, scheleți, dragoni, lupi/rechini Nightfall și evenimente recurente folosesc aceeași resursă.</li>\n<li>Păstrați fragmentele mov S. Crystal 5 stele poate deveni aur S+ în S1, dar evoluția ulterioară costă mult.</li>\n<li>Așteptați buguri. Regulile au diferit între servere; verificați des calendarul și regulile live.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-4-caldura-inghet-si-furnale\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Căldură, îngheț și furnale</h2><ul>\n<li>Există două furnale: Thermal Furnace personal pentru propriul castel/rezistență și Union Furnace care încălzește zona pentru castelele din jur.</li>\n<li>Cold Snap este pericol recurent. Fără furnal pregătit, castelele pot îngheța și pierde acțiuni importante.</li>\n<li>Un castel înghețat poate încă ucide Frost Zombies, farma, omorî zombi normali, jefui vagoane, face unele questuri de intelligence/tavernă, ataca World Boss și se reloca.</li>\n<li>Un castel înghețat nu poate ataca Elite Zombies, lansa rallies sau participa la Union Boss. Disciplina de căldură este obligatorie.</li>\n<li>Poziția Union Furnace trebuie să acopere jucătorii activi și zonele operaționale. Mai adânc pe hartă, lângă/în oraș ocupat util este deseori mai bine.</li>\n<li>Orașele ocupate dau căldură locală; Frost Mines nu. Centrul hărții este mai rece decât exteriorul.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-5-plasarea-castelului-si-teren-contaminat\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Plasarea castelului și teren contaminat</h2><ul>\n<li>Castelele trebuie puse în zona caldă, aproape de grup și în raza practică a Union Furnace.</li>\n<li>Evitați terenul întunecat/contaminat lângă mine și orașe; poate aduce restricții și risc mai mare.</li>\n<li>La început, multe uniuni rămân lângă sate nivel 1 sau zone Frost Mine nivel 2, unde temperatura este mai ușor de gestionat.</li>\n<li>Înainte de relocare mare, încălziți jucătorii-cheie, verificați acoperirea furnalului și spuneți clar unde se parchează.</li>\n<li>Relocarea nu este doar teleport; este decizie de căldură, rally, apărare, stamina și activitate.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-6-mine-orase-si-cristale-de-gheata\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Mine, orașe și cristale de gheață</h2><ul>\n<li>Frost Mines și orașele sunt baza scorului. Captura ajută, dar menținerea contează pentru Ice Crystals.</li>\n<li>Valoarea cristalelor depinde de ce deține uniunea, nu doar de ce a capturat cândva. Abandonarea poate reduce valoarea.</li>\n<li>Capacitatea de bază Frost Mine este des raportată ca 3. Fiecare oraș/sat adaugă capacitate; orașele nivel 6 pot da mai mult, adesea +2.</li>\n<li>Limitele variază după server și faza cross-server. Verificați mereu Union City și regulile actuale.</li>\n<li>Prima captură poate da cutii de loot pentru uniune; distribuiți corect și verificați tagul de first capture.</li>\n<li>Nu abandonați mine sau orașe importante fără coordonare. Teritoriul înseamnă scor, acces, rută, căldură și negociere.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-7-ruta-si-expansiune-timpurie\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>7. Rută și expansiune timpurie</h2><ul>\n<li>Nu planificați perfect înainte de start, deoarece poziția inițială poate fi necunoscută.</li>\n<li>După start, decideți rapid ruta spre mine valoroase, orașe utile și zone-cheie.</li>\n<li>Dacă bossul unei Frost Mine este prea puternic, pivotați la o mină mai joasă apropiată.</li>\n<li>Minele nu trebuie mereu luate numeric, dar trebuie de obicei să atingă teritoriul propriu; diagonala nu ajunge.</li>\n<li>Orașele se deschid prin time gates; mai târziu declarațiile pot fi limitate la miercuri și sâmbătă.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-8-kingdom-expedition-si-avanposturi\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>8. Kingdom Expedition și avanposturi</h2><ul>\n<li>Kingdom Expedition deschide faza cross-server. R4/R5 pun avanposturi pe alte servere; de obicei nu pe serverul propriu.</li>\n<li>Rapoartele diferă despre mutarea avanposturilor; tratați plasarea ca importantă și verificați interfața.</li>\n<li>După plasare, prima mină conectată este punctul practic de start, apoi expansiunea merge prin teren adiacent.</li>\n<li>Expedition permite adesea relocare gratuită dacă este folosită corect; jucătorii neexperimentați trebuie să exerseze.</li>\n<li>Nu invadați orbește. Comerțul și diplomația economisesc trupe, deoarece CoK și alte evenimente continuă.</li>\n<li>Fiecare uniune poate alege ținta, iar mai multe uniuni pot presa același server; timingul și diplomația valorează mult.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-9-diplomatie-zile-de-razboi-si-tile-uri\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>9. Diplomație, zile de război și tile-uri</h2><ul>\n<li>Sezonul 1 poate distruge trupele dacă se atacă castele fără scop. Multe servere folosesc acorduri pentru a evita pierderi inutile.</li>\n<li>Coexistența este strategie. Schimbul de obiective, ferestre scurte de recompense și evitarea arderii castelelor ajută progresul.</li>\n<li>Tile-urile de resurse sunt diferite de castele. Fără pact de non-agresiune, inamicii de pe tile pot fi atacați.</li>\n<li>Zilele de război cer ordine clare: dacă luptăm, luptăm cu țintă și timp; dacă respectăm acord, comunicăm.</li>\n<li>Inactivii și non-combatanții trebuie să știe când folosesc scut. Greșeli și conflicte pe tile pot apărea.</li>\n<li>Royal City poate fi la 0 °C în CoK, dar nu este soluție permanentă de căldură pentru tot regatul.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-10-class-hall-skilluri-si-reset\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>10. Class Hall, skilluri și reset</h2><ul>\n<li>Class Hall și Class EXP sunt importante. Architect este discutat pentru construcție, research și asediu.</li>\n<li>Unele skilluri cresc daunele la durabilitatea zidului în city siege.</li>\n<li>Forced March sau Siege Banner au teste mixte; nu investiți orbește.</li>\n<li>Skillurile nivel 15+ se deschid diferit pe servere; blocarea poate fi fază, bug sau întârziere.</li>\n<li>Resetul de class skills poate fi strategic. Skillurile normale rămân utile după S1; skillurile sezoniere pot fi rambursate sau dispărea.</li>\n<li>Spre final, mutați puncte spre Research, Building și Resource Production, dacă se potrivesc scopului.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-11-eroi-boosturi-crystal-si-level-swap\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>11. Eroi, boosturi, Crystal și Level Swap</h2><ul>\n<li>Eroi boost menționați: Crystal, Sera, Fenixia/Fenxia și Daphne.</li>\n<li>Crystal contează mult pentru F2P/low spend: la 5 stele poate deveni aur S+, dar apoi cere multe fragmente mov S+.</li>\n<li>Level Swap schimbă doar nivelurile EXP. Nu transferă stele, ascension, medalii sau skilluri; skillurile se pot bloca dacă nivelul scade.</li>\n<li>Nu folosiți Level Swap prea devreme pe erou aur fără stele. Strângeți fragmente și schimbați când devine util în luptă.</li>\n<li>Sera’s Bow of Tomorrow este echipament exclusiv care nu înlocuiește gear normal, ci adaugă skilluri și poate crește nivelul maxim. Cere de obicei Sera 5 stele și fragmente specifice.</li>\n<li>Echipamentul exclusiv poate fi scump; Black Market / Season Festival poate oferi acces mai lent.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-12-orase-nivel-6-royal-city-si-endgame\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>12. Orașe nivel 6, Royal City și endgame</h2><ul>\n<li>Orașele nivel 6 sunt printre cele mai importante înainte de Royal City; pot da multe cristale și acces.</li>\n<li>Dacă sunt controlate de uniuni puternice, negocierea poate fi mai realistă decât forța.</li>\n<li>Săptămâna 7 este faza decisivă. Așteptarea ultimelor zile este periculoasă din cauza protecțiilor și blocărilor.</li>\n<li>Nu pierdeți oraș nivel 6 târziu crezând că îl recuperați după; multe servere au raportat lock-uri.</li>\n<li>Royal City dă autoritate, recompense, titluri sau buffuri, dar nu neapărat cristale. Royal Furnace încălzește local.</li>\n<li>Scopul final: combinație realistă de fabrici, orașe utile, Frost Mines și acces, cu pierderi minime.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-13-dupa-sezonul-1-si-black-market\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>13. După Sezonul 1 și Black Market</h2><ul>\n<li>După S1 poate veni Season Festival / Black Market pentru recuperare și pregătire.</li>\n<li>Black Gold Coins, bingo quests și shop rotation devin importante. Prioritizați fragmente exclusive, decorații, rame, speedups și resurse eroi.</li>\n<li>Unele clădiri sau elemente rămân, dar Cold Snap, comori sau Expedition se termină.</li>\n<li>Regulile post-sezon diferă; planificați ca și cum săptămâna 7 e ultima șansă sigură.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-14-checklist-zilnic-pentru-leadership\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>14. Checklist zilnic pentru leadership</h2><ul>\n<li>Verificați calendarul înainte de ordine.</li>\n<li>Verificați furnalul, donațiile coal/gold și căldura.</li>\n<li>Folosiți încercările de mine pe ruta planificată.</li>\n<li>Coordonați declarațiile și evitați abandonări accidentale.</li>\n<li>Urmăriți diplomația, NAP-urile și regulile de tile.</li>\n<li>Reamintiți folosirea inteligentă a stamina între mine, zombi, Arm Race, scheleți, dragoni, Nightfall și evenimente.</li>\n<li>Pregătiți săptămâna 7: orașe cheie, mine de acces, timing inamic, furnal, rally leaders și scuturi.</li>\n</ul></article>\n<article class=\"chapter\" id=\"ro-15-glosar-si-rezumat-final\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>15. Glosar și rezumat final</h2><ul>\n<li>Thermal Furnace: furnal personal pentru căldură și rezistență.</li>\n<li>Union Furnace: furnal de alianță care încălzește zona.</li>\n<li>Cold Snap: scădere de temperatură care îngheață castele.</li>\n<li>Frost Mine: teritoriu sezonier pentru expansiune, recompense și cristale.</li>\n<li>City: sat, manor, factory, town sau metropolă/bibliotecă nivel 6.</li>\n<li>Ice Crystals: resursă de scor legată de teritoriu deținut.</li>\n<li>Outpost: structură pentru expansiune cross-server.</li>\n<li>Tile: câmp de resurse, diferit de atacul pe castel.</li>\n<li>Rezumat: S1 recompensează căldura, coordonarea, stamina folosită bine, acordurile utile și endgame pregătit devreme.</li>\n</ul></article>", "pl": "<article class=\"chapter\" id=\"pl-1-cel-i-hierarchia-zrode\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Cel i hierarchia źródeł</h2><ul>\n<li>Ten poradnik jest praktycznym przewodnikiem liderów dla X-Clash Sezon 1: Winter Is Coming / Polar Tempest. Jest dla każdej unii, nie dla konkretnego serwera.</li>\n<li>Hierarchia źródeł: oficjalne materiały X-Clash / Strawberry są najważniejsze; Animality / Pioneer Test Group to mocny dowód praktyczny; doświadczeni twórcy poradników i gracze to cenne raporty; pojedyncze komentarze mają niższą pewność.</li>\n<li>Jeśli kalendarz wydarzeń, oficjalna tabela lub aktualne zasady gry przeczą starym postom Discord, najpierw stosuj aktualne informacje w grze.</li>\n<li>Celem jest kolejność priorytetów: ciepło, terytorium, trasa, dyplomacja, stamina, nagrody i bezpieczeństwo końcówki sezonu.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-2-sezon-1-w-jednym-zdaniu\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Sezon 1 w jednym zdaniu</h2><ul>\n<li>Sezon 1 to nie tylko walka. To logistyka, przetrwanie i kontrola terytorium.</li>\n<li>Najsilniejsze unie nie zawsze najwięcej atakują; utrzymują graczy w cieple, trzymają użyteczne kopalnie i miasta, dobrze wydają staminę, szanują przydatne umowy i wcześnie przygotowują finał.</li>\n<li>Zasada: zostań w cieple, rozwijaj się z celem, trzymaj to, co ważne, i nie czekaj do ostatniego tygodnia z naprawą błędów.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-3-przygotowanie-przed-sezonem\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Przygotowanie przed sezonem</h2><ul>\n<li>Naucz graczy poprawnego parkowania zamków w ciepłych strefach. Rozproszone zamki zamarzają i tracą efektywność.</li>\n<li>Gracze muszą rozumieć punkt zbiórki / teleport unii. Zły relok kosztuje czas i ciepło.</li>\n<li>Usuń drużyny z obrony muru przed niebezpiecznymi fazami: Castle Wall &gt; City Defense &gt; odznacz Join the defense. Inaczej wróg może drenować wojsko.</li>\n<li>Oszczędzaj staminę. Frost Mines, zombie, potwory, szkielety, smoki, wilki/rekiny Nightfall i powtarzalne eventy używają tej samej puli.</li>\n<li>Zachowaj fioletowe odłamki S. Crystal 5 gwiazdek może stać się złotą S+ w S1, ale dalsze gwiazdki są drogie.</li>\n<li>Spodziewaj się bugów i zmian. Sprawdzaj kalendarz i aktualne zasady.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-4-ciepo-zamarzanie-i-piece\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Ciepło, zamarzanie i piece</h2><ul>\n<li>Są dwa piece: osobisty Thermal Furnace dla własnego zamku/odporności oraz Union Furnace ogrzewający okolicę i zamki sojuszników.</li>\n<li>Cold Snap to powtarzalne zagrożenie. Bez gotowego pieca zamek może zamarznąć i stracić ważne akcje.</li>\n<li>Zamarznięty zamek może nadal zabijać Frost Zombies, farmić, zabijać zwykłe zombie, plądrować wagony, robić część zadań intelligence/tavern, atakować World Boss i relokować.</li>\n<li>Zamarznięty zamek nie może atakować Elite Zombies, odpalać rajdów ani brać udziału w Union Boss. Dyscyplina ciepła jest obowiązkowa.</li>\n<li>Union Furnace musi obejmować aktywnych graczy i ważne strefy. Głębiej na mapie często lepiej ustawić go przy/w zajętym mieście.</li>\n<li>Zajęte miasta dają lokalne ciepło. Frost Mines nie dają ciepła. Środek mapy jest zimniejszy niż obrzeża.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-5-pozycja-zamku-i-teren-skazony\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Pozycja zamku i teren skażony</h2><ul>\n<li>Zamki powinny stać w ciepłej strefie, blisko grupy i w zasięgu Union Furnace.</li>\n<li>Unikaj ciemnego/skażonego terenu koło kopalń i miast; może dawać ograniczenia i większe ryzyko ataku.</li>\n<li>Na początku wiele unii zostaje przy wioskach poziom 1 lub Frost Mine poziom 2, gdzie łatwiej utrzymać temperaturę.</li>\n<li>Przed dużą relokacją ogrzej kluczowych graczy, sprawdź zasięg pieca i jasno powiedz słabszym, gdzie stać.</li>\n<li>Relokacja to nie tylko teleport. To decyzja o cieple, rajdach, obronie, staminie i aktywności.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-6-kopalnie-miasta-i-krysztay-lodu\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Kopalnie, miasta i kryształy lodu</h2><ul>\n<li>Frost Mines i miasta są podstawą punktacji. Zdobycie pomaga, ale liczy się trzymanie dla Ice Crystals.</li>\n<li>Wartość kryształów zależy od tego, co unia posiada, nie tylko co kiedyś zdobyła. Porzucenie może obniżyć wartość.</li>\n<li>Bazowy limit Frost Mines często wynosi 3. Każde miasto/wioska zwykle dodaje limit; miasta poziom 6 często dają +2.</li>\n<li>Limity zależą od serwera i fazy cross-server. Zawsze sprawdzaj Union City i aktualne zasady eventu.</li>\n<li>Pierwsze zdobycie może dać skrzynie unii. Rozdzielaj je uczciwie i sprawdź tag first capture.</li>\n<li>Nie porzucaj ważnych miast/kopalń bez koordynacji. Terytorium to punkty, dostęp, trasa, ciepło i siła negocjacji.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-7-trasa-i-wczesna-ekspansja\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>7. Trasa i wczesna ekspansja</h2><ul>\n<li>Nie planuj idealnej trasy przed startem, bo pozycja początkowa może być znana dopiero po otwarciu mapy.</li>\n<li>Po starcie szybko ustal trasę do wartościowych kopalń, użytecznych miast i kluczowych stref.</li>\n<li>Jeśli boss Frost Mine jest za mocny, nie trać dnia; przejdź do niższej pobliskiej kopalni.</li>\n<li>Frost Mines nie zawsze trzeba brać numerycznie, ale zwykle muszą dotykać własnego terenu. Diagonal nie wystarcza.</li>\n<li>Miasta otwierają się czasowo. Później deklaracje mogą być ograniczone do środy i soboty.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-8-kingdom-expedition-i-posterunki\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>8. Kingdom Expedition i posterunki</h2><ul>\n<li>Kingdom Expedition otwiera fazę cross-server. R4/R5 stawiają outposty na innych serwerach, zwykle nie na własnym.</li>\n<li>Raporty o przenoszeniu outpostów są różne, więc traktuj pozycję jako ważną i sprawdź interfejs eventu.</li>\n<li>Po postawieniu outpostu pierwsza połączona kopalnia jest punktem startowym, potem ekspansja idzie przez sąsiedni teren.</li>\n<li>Expedition często pozwala na darmową relokację, jeśli zrobiona poprawnie. Niedoświadczeni powinni ćwiczyć, by nie marnować teleportów.</li>\n<li>Nie najeżdżaj w ciemno. Handel i dyplomacja oszczędzają wojsko, bo CoK i inne eventy trwają dalej.</li>\n<li>Każda unia wybiera cel, a wiele unii może naciskać ten sam serwer. Timing i dyplomacja są ważniejsze niż emocje.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-9-dyplomacja-dni-wojny-i-pola-zasobow\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>9. Dyplomacja, dni wojny i pola zasobów</h2><ul>\n<li>Sezon 1 może zniszczyć wojsko, jeśli zamki są atakowane bez sensu. Wiele serwerów ma umowy, by unikać strat.</li>\n<li>Koegzystencja to strategia. Wymiana celów, krótkie okna nagród i unikanie palenia zamków pomagają obu stronom.</li>\n<li>Pola zasobów różnią się od zamków. Bez paktu o nieagresji przeciwników na tile można często atakować.</li>\n<li>Dni wojny wymagają jasnych rozkazów: jeśli walczymy, to z celem i godziną; jeśli jest umowa, komunikujemy ją.</li>\n<li>Nieaktywni i niewalczący muszą znać oczekiwania co do tarcz. Błędy i konflikty o tile się zdarzają.</li>\n<li>Royal City może mieć 0 °C podczas CoK, ale nie jest stałym źródłem ciepła dla królestwa.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-10-class-hall-umiejetnosci-i-reset\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>10. Class Hall, umiejętności i reset</h2><ul>\n<li>Class Hall i Class EXP są ważne. Architect omawia się za budowę, research i siege.</li>\n<li>Niektóre skille zwiększają obrażenia durability muru miasta podczas city siege.</li>\n<li>Forced March i Siege Banner mają mieszane testy; nie inwestuj ślepo.</li>\n<li>Skille poziom 15+ odblokowują się różnie na serwerach; blokada może być fazą, bugiem lub opóźnieniem.</li>\n<li>Reset skilli klasy może być strategiczny. Normal skills zostają po S1, a season skills mogą zostać zwrócone lub zniknąć.</li>\n<li>Pod koniec przenieś punkty w Research, Building i Resource Production, jeśli pasuje do celu.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-11-bohaterowie-boosty-crystal-i-level-swap\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>11. Bohaterowie, boosty, Crystal i Level Swap</h2><ul>\n<li>Bohaterowie z boostem: Crystal, Sera, Fenixia/Fenxia, Daphne.</li>\n<li>Crystal jest ważna dla F2P/low spend: 5 gwiazdek może stać się złotą S+, ale potem wymaga wielu fioletowych S+ shardów.</li>\n<li>Level Swap wymienia tylko poziomy EXP. Nie przenosi gwiazdek, ascension, medali ani skilli; spadek poziomu może zablokować skille.</li>\n<li>Nie używaj Level Swap za wcześnie na złotym bohaterze bez gwiazdek. Najpierw zbierz shardy, potem wymień, gdy będzie gotowy.</li>\n<li>Sera’s Bow of Tomorrow to exclusive gear: nie zastępuje normalnego gearu, dodaje skille i może zwiększać max poziom. Wymaga zwykle Sery 5 gwiazdek i konkretnych shardów.</li>\n<li>Exclusive gear bywa drogi; Black Market / Season Festival może dać wolniejszy dostęp.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-12-miasta-poziom-6-royal-city-i-endgame\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>12. Miasta poziom 6, Royal City i endgame</h2><ul>\n<li>Miasta poziom 6 są jednymi z najważniejszych przed Royal City; mogą dawać dużo kryształów i dostęp.</li>\n<li>Jeśli trzymają je silne unie, negocjacje mogą być bardziej realne niż siła.</li>\n<li>Tydzień 7 to często decydujący push. Czekanie do końca jest niebezpieczne przez ochrony, blokady i zmiany zasad.</li>\n<li>Nie trać miasta poziom 6 późno zakładając, że odzyskasz po sezonie; wiele serwerów zgłasza locki.</li>\n<li>Royal City daje władzę, nagrody, tytuły lub buffy, ale niekoniecznie Ice Crystals. Royal Furnace grzeje lokalnie.</li>\n<li>Cel finału: najlepsza realna kombinacja fabryk, użytecznych miast, Frost Mines i dostępu przy minimalnych stratach.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-13-po-sezonie-1-i-black-market\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>13. Po Sezonie 1 i Black Market</h2><ul>\n<li>Po S1 może pojawić się Season Festival / Black Market jako faza regeneracji.</li>\n<li>Black Gold Coins, bingo questy i sklep są ważne. Priorytet: exclusive shardy, dekoracje, ramki, speedupy i zasoby bohaterów.</li>\n<li>Część budynków/mapy może zostać, ale Cold Snap, skarby lub Expedition się kończą.</li>\n<li>Zasady po sezonie różnią się między serwerami. Planuj tak, jakby tydzień 7 był ostatnią pewną szansą.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-14-codzienna-checklista-liderow\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>14. Codzienna checklista liderów</h2><ul>\n<li>Sprawdź kalendarz eventu przed rozkazami.</li>\n<li>Sprawdź piec, darowizny węgla/złota i ciepło.</li>\n<li>Używaj prób kopalń na cele trasy.</li>\n<li>Koordynuj deklaracje i unikaj przypadkowego porzucania.</li>\n<li>Śledź dyplomację, NAP i zasady tile.</li>\n<li>Przypominaj o rozsądnej staminie między kopalniami, zombie, Arm Race, szkieletami, smokami, Nightfall i eventami.</li>\n<li>Przygotuj tydzień 7: kluczowe miasta, kopalnie dostępu, timing wroga, piec, liderów rajdów i tarcze.</li>\n</ul></article>\n<article class=\"chapter\" id=\"pl-15-sownik-i-podsumowanie\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>15. Słownik i podsumowanie</h2><ul>\n<li>Thermal Furnace: osobisty piec dla ciepła i odporności.</li>\n<li>Union Furnace: piec unii ogrzewający obszar.</li>\n<li>Cold Snap: spadek temperatury zamrażający zamki.</li>\n<li>Frost Mine: sezonowe terytorium dla ekspansji, nagród i kryształów.</li>\n<li>City: wioska, manor, factory, town lub metropolia/biblioteka poziom 6.</li>\n<li>Ice Crystals: główny zasób punktacji powiązany z posiadanym terytorium.</li>\n<li>Outpost: struktura Expedition dla ekspansji cross-server.</li>\n<li>Tile: pole zasobów, traktowane inaczej niż zamek.</li>\n<li>Podsumowanie: S1 nagradza ciepło, koordynację, dobrą staminę, użyteczne umowy i wczesne zabezpieczenie endgame.</li>\n</ul></article>"}, "s2Content": {"en": "<div class=\"lang-title\"><span>EN</span><div><h1>Season 2: Desert Dynasty</h1><p>Preview guide – territory, Dark Oil and desert progression</p></div></div><div class=\"card-grid\"><a class=\"chapter-card desert\" href=\"#s2-en-overview\" data-target=\"s2-en-overview\"><span>🏺</span><strong>Overview</strong><small>01</small></a><a class=\"chapter-card desert\" href=\"#s2-en-goals\" data-target=\"s2-en-goals\"><span>🏺</span><strong>Main goals</strong><small>02</small></a><a class=\"chapter-card desert\" href=\"#s2-en-resources\" data-target=\"s2-en-resources\"><span>🛢️</span><strong>Resources and systems</strong><small>03</small></a><a class=\"chapter-card desert\" href=\"#s2-en-map\" data-target=\"s2-en-map\"><span>🏜️</span><strong>Map and positioning</strong><small>04</small></a><a class=\"chapter-card desert\" href=\"#s2-en-events\" data-target=\"s2-en-events\"><span>🦂</span><strong>Events and enemies</strong><small>05</small></a><a class=\"chapter-card desert\" href=\"#s2-en-symbols\" data-target=\"s2-en-symbols\"><span>☀️</span><strong>Theme symbols</strong><small>06</small></a><a class=\"chapter-card desert\" href=\"#s2-en-prep\" data-target=\"s2-en-prep\"><span>🏺</span><strong>Preparation</strong><small>07</small></a><a class=\"chapter-card desert\" href=\"#s2-en-warning\" data-target=\"s2-en-warning\"><span>🌪️</span><strong>Important warning</strong><small>08</small></a></div><article class=\"chapter desert-chapter\" id=\"s2-en-overview\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Overview</h2><p>Desert Dynasty appears to continue the seasonal model with a new desert map, territory control and ranking pressure. The central resource is Dark Oil. Captured cities in the Sand Sea Dynasty produce Dark Oil over time, and the final ranking depends heavily on how much Dark Oil the union holds. The basic lesson from Season 1 remains valid: the season is not won by random fighting, but by positioning, route control, diplomacy and discipline.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-en-goals\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Main goals</h2><p>The main goals are to capture useful cities, protect production, collect Dark Oil efficiently and keep a stable path toward high-value objectives. The Royal City remains a political and strategic target, but the real daily progress comes from holding productive territory. A union should decide early which cities are realistic, which routes are worth defending and where diplomacy is smarter than troop loss.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-en-resources\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Resources and systems</h2><p>Known preview terms include Dark Oil, Holy Water, Red Copper, Elixir and Bronze. The exact conversion values may change, so official event screens and calendar data should be treated as the source of truth. The expected structure points toward seasonal buildings and desert progression systems such as Union Center, Tree of Life, Fountain of Life, Altar of Heroes and Heroes’ Training Ground.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-en-map\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Map and positioning</h2><p>Desert seasons will likely reward unions that control routes, avoid overextension and keep active players close to strategic objectives. Do not scatter castles without purpose. A compact formation is easier to reinforce, easier to coordinate and less likely to bleed troops during war windows. If sandstorm or heat mechanics appear, positioning will matter even more.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-en-events\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Events and enemies</h2><p>Preview discussions mention Sand Beasts, Desert Market and Sand Beast Scales. Treat them as recurring progression opportunities: spend stamina with intent, do not empty it before important event windows, and prioritize targets that help both individual growth and union ranking.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-en-symbols\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Theme symbols</h2><p>Winter used ice crystals and snowflakes. Desert Dynasty should use desert symbols: dunes, sun, sandstorm, scorpion, cobra, caravan, amphora and Dark Oil barrels. These symbols fit the season visually and help players immediately recognize whether they are reading winter or desert guidance.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-en-prep\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Preparation</h2><p>Before Season 2 starts, unions should clean up leadership channels, define translation posts, decide how rewards will be communicated, and keep players used to reading event calendars. Save flexible resources, avoid last-minute chaos and assume that official rules may change by week.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-en-warning\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Important warning</h2><p>This is a preview section, not a final Season 2 doctrine. Once official charts, screenshots and tested mechanics are available, this chapter should be updated. Until then, the safe strategy is clear: stay coordinated, protect production, watch Dark Oil, and do not waste resources on unclear moves.</p></article>", "de": "<div class=\"lang-title\"><span>DE</span><div><h1>Season 2: Wüsten-Dynastie</h1><p>Vorschau-Guide – Gebiet, Dunkles Öl und Wüstenfortschritt</p></div></div><div class=\"card-grid\"><a class=\"chapter-card desert\" href=\"#s2-de-ueberblick\" data-target=\"s2-de-ueberblick\"><span>🏺</span><strong>Überblick</strong><small>01</small></a><a class=\"chapter-card desert\" href=\"#s2-de-ziele\" data-target=\"s2-de-ziele\"><span>🏺</span><strong>Hauptziele</strong><small>02</small></a><a class=\"chapter-card desert\" href=\"#s2-de-ressourcen\" data-target=\"s2-de-ressourcen\"><span>🛢️</span><strong>Ressourcen und Systeme</strong><small>03</small></a><a class=\"chapter-card desert\" href=\"#s2-de-karte\" data-target=\"s2-de-karte\"><span>🏜️</span><strong>Karte und Platzierung</strong><small>04</small></a><a class=\"chapter-card desert\" href=\"#s2-de-events\" data-target=\"s2-de-events\"><span>🦂</span><strong>Events und Gegner</strong><small>05</small></a><a class=\"chapter-card desert\" href=\"#s2-de-symbole\" data-target=\"s2-de-symbole\"><span>☀️</span><strong>Themen-Symbole</strong><small>06</small></a><a class=\"chapter-card desert\" href=\"#s2-de-vorbereitung\" data-target=\"s2-de-vorbereitung\"><span>🏺</span><strong>Vorbereitung</strong><small>07</small></a><a class=\"chapter-card desert\" href=\"#s2-de-warnung\" data-target=\"s2-de-warnung\"><span>🌪️</span><strong>Wichtiger Hinweis</strong><small>08</small></a></div><article class=\"chapter desert-chapter\" id=\"s2-de-ueberblick\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Überblick</h2><p>Die Wüsten-Dynastie scheint das Saisonmodell mit neuer Wüstenkarte, Gebietskontrolle und Ranglistendruck fortzuführen. Die zentrale Ressource ist Dunkles Öl. Eroberte Städte in der Sandmeer-Dynastie produzieren mit der Zeit Dunkles Öl, und die Endplatzierung hängt stark davon ab, wie viel Dunkles Öl die Union hält. Die wichtigste Lehre aus Season 1 bleibt: Nicht zufälliges Kämpfen gewinnt die Saison, sondern Positionierung, Routenführung, Diplomatie und Disziplin.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-de-ziele\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Hauptziele</h2><p>Die Hauptziele sind nützliche Städte erobern, Produktion schützen, Dunkles Öl effizient sammeln und einen stabilen Weg zu wertvollen Zielen halten. Die Königsstadt bleibt politisch und strategisch wichtig, aber der tägliche Fortschritt entsteht vor allem durch gehaltenes produktives Gebiet. Eine Union sollte früh entscheiden, welche Städte realistisch sind, welche Routen verteidigt werden und wo Diplomatie besser ist als Truppenverlust.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-de-ressourcen\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Ressourcen und Systeme</h2><p>Bekannte Vorschau-Begriffe sind Dunkles Öl, Heiliges Wasser, Rotes Kupfer, Elixier und Bronze. Die genauen Werte können sich ändern; offizielle Eventanzeigen und Kalenderdaten sind daher die stärkste Quelle. Die Struktur deutet auf Saisongebäude und Wüstenfortschritt hin, etwa Union Center, Baum des Lebens, Quelle des Lebens, Heldenaltar und Helden-Trainingsplatz.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-de-karte\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Karte und Platzierung</h2><p>Wüstensaisons werden wahrscheinlich Unionen belohnen, die Routen kontrollieren, Überdehnung vermeiden und aktive Spieler nahe an strategischen Zielen halten. Burgen sollten nicht ohne Zweck verstreut werden. Eine kompakte Formation lässt sich leichter verstärken, besser koordinieren und verliert in Kriegsfenstern weniger Truppen. Falls Sandsturm- oder Hitze-Mechaniken erscheinen, wird Platzierung noch wichtiger.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-de-events\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Events und Gegner</h2><p>In Vorschauen werden Sandbestien, Wüstenmarkt und Sandbestien-Schuppen erwähnt. Behandle sie als wiederkehrende Fortschrittsquellen: Ausdauer gezielt einsetzen, nicht vor wichtigen Eventfenstern leeren, und Ziele priorisieren, die persönliches Wachstum und Union-Ranking gleichzeitig unterstützen.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-de-symbole\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Themen-Symbole</h2><p>Winter nutzte Eiskristalle und Schneeflocken. Zur Wüsten-Dynastie passen Wüstensymbole: Dünen, Sonne, Sandsturm, Skorpion, Kobra, Karawane, Amphore und Fässer mit Dunklem Öl. Diese Symbole machen sofort sichtbar, ob man Winter- oder Wüstenhinweise liest.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-de-vorbereitung\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Vorbereitung</h2><p>Vor Season 2 sollten Unionen Leadership-Kanäle aufräumen, Übersetzungsposts festlegen, die Kommunikation von Belohnungen klären und Spieler daran gewöhnen, Eventkalender zu lesen. Flexible Ressourcen sparen, Last-Minute-Chaos vermeiden und davon ausgehen, dass offizielle Regeln pro Woche angepasst werden können.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-de-warnung\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Wichtiger Hinweis</h2><p>Dies ist ein Vorschau-Kapitel, keine endgültige Season-2-Doktrin. Sobald offizielle Tabellen, Screenshots und getestete Mechaniken verfügbar sind, sollte dieser Bereich aktualisiert werden. Bis dahin gilt: koordiniert bleiben, Produktion schützen, Dunkles Öl beobachten und keine Ressourcen für unklare Aktionen verschwenden.</p></article>", "es": "<div class=\"lang-title\"><span>ES</span><div><h1>Temporada 2: Dinastía del Desierto</h1><p>Guía previa – territorio, Aceite Oscuro y progreso en el desierto</p></div></div><div class=\"card-grid\"><a class=\"chapter-card desert\" href=\"#s2-es-resumen\" data-target=\"s2-es-resumen\"><span>🏺</span><strong>Resumen</strong><small>01</small></a><a class=\"chapter-card desert\" href=\"#s2-es-objetivos\" data-target=\"s2-es-objetivos\"><span>🏺</span><strong>Objetivos principales</strong><small>02</small></a><a class=\"chapter-card desert\" href=\"#s2-es-recursos\" data-target=\"s2-es-recursos\"><span>🛢️</span><strong>Recursos y sistemas</strong><small>03</small></a><a class=\"chapter-card desert\" href=\"#s2-es-mapa\" data-target=\"s2-es-mapa\"><span>🏜️</span><strong>Mapa y posición</strong><small>04</small></a><a class=\"chapter-card desert\" href=\"#s2-es-eventos\" data-target=\"s2-es-eventos\"><span>🦂</span><strong>Eventos y enemigos</strong><small>05</small></a><a class=\"chapter-card desert\" href=\"#s2-es-simbolos\" data-target=\"s2-es-simbolos\"><span>☀️</span><strong>Símbolos del tema</strong><small>06</small></a><a class=\"chapter-card desert\" href=\"#s2-es-preparacion\" data-target=\"s2-es-preparacion\"><span>🏺</span><strong>Preparación</strong><small>07</small></a><a class=\"chapter-card desert\" href=\"#s2-es-aviso\" data-target=\"s2-es-aviso\"><span>🌪️</span><strong>Aviso importante</strong><small>08</small></a></div><article class=\"chapter desert-chapter\" id=\"s2-es-resumen\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Resumen</h2><p>La Dinastía del Desierto parece continuar el modelo de temporadas con un nuevo mapa desértico, control de territorio y presión de clasificación. El recurso central es el Aceite Oscuro. Las ciudades capturadas en la Dinastía del Mar de Arena producen Aceite Oscuro con el tiempo, y la clasificación final depende en gran parte de cuánto Aceite Oscuro conserva la unión. La lección de Season 1 sigue siendo válida: la temporada no se gana con peleas aleatorias, sino con posición, rutas, diplomacia y disciplina.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-es-objetivos\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Objetivos principales</h2><p>Los objetivos principales son capturar ciudades útiles, proteger la producción, reunir Aceite Oscuro de forma eficiente y mantener una ruta estable hacia objetivos de alto valor. La Ciudad Real sigue siendo importante, pero el progreso diario viene de mantener territorio productivo. Una unión debe decidir pronto qué ciudades son realistas, qué rutas puede defender y dónde la diplomacia es mejor que perder tropas.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-es-recursos\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Recursos y sistemas</h2><p>Los términos conocidos de la vista previa incluyen Aceite Oscuro, Agua Sagrada, Cobre Rojo, Elixir y Bronce. Los valores exactos pueden cambiar, así que las pantallas oficiales del evento y el calendario deben ser la fuente principal. La estructura apunta a edificios de temporada y sistemas como Centro de la Unión, Árbol de la Vida, Fuente de la Vida, Altar de Héroes y Campo de Entrenamiento de Héroes.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-es-mapa\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Mapa y posición</h2><p>Las temporadas de desierto probablemente recompensen a las uniones que controlan rutas, evitan extenderse demasiado y mantienen a los jugadores activos cerca de objetivos estratégicos. No disperses castillos sin propósito. Una formación compacta se refuerza mejor, se coordina mejor y pierde menos tropas durante ventanas de guerra. Si aparecen mecánicas de tormenta de arena o calor, la posición será aún más importante.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-es-eventos\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Eventos y enemigos</h2><p>Las vistas previas mencionan Bestias de Arena, Mercado del Desierto y Escamas de Bestia de Arena. Trátalos como oportunidades recurrentes de progreso: usa stamina con intención, no la gastes antes de ventanas importantes y prioriza objetivos que ayuden al crecimiento personal y al ranking de la unión.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-es-simbolos\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Símbolos del tema</h2><p>El invierno usó cristales de hielo y copos de nieve. Para la Dinastía del Desierto encajan símbolos de desierto: dunas, sol, tormenta de arena, escorpión, cobra, caravana, ánfora y barriles de Aceite Oscuro. Ayudan a reconocer al instante si la guía es de invierno o desierto.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-es-preparacion\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Preparación</h2><p>Antes de la Temporada 2, las uniones deberían ordenar canales de liderazgo, definir publicaciones de traducción, aclarar cómo se comunican las recompensas y acostumbrar a los jugadores a revisar el calendario de eventos. Guarda recursos flexibles, evita caos de último minuto y asume que las reglas oficiales pueden cambiar por semana.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-es-aviso\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Aviso importante</h2><p>Esta es una sección de vista previa, no una doctrina final de Season 2. Cuando existan tablas oficiales, capturas y mecánicas probadas, este capítulo debe actualizarse. Hasta entonces, la estrategia segura es clara: coordinación, proteger producción, vigilar Aceite Oscuro y no desperdiciar recursos en movimientos poco claros.</p></article>", "br": "<div class=\"lang-title\"><span>BR</span><div><h1>Temporada 2: Dinastia do Deserto</h1><p>Guia prévio – território, Óleo Escuro e progresso no deserto</p></div></div><div class=\"card-grid\"><a class=\"chapter-card desert\" href=\"#s2-br-visao\" data-target=\"s2-br-visao\"><span>🏺</span><strong>Visão geral</strong><small>01</small></a><a class=\"chapter-card desert\" href=\"#s2-br-objetivos\" data-target=\"s2-br-objetivos\"><span>🏺</span><strong>Objetivos principais</strong><small>02</small></a><a class=\"chapter-card desert\" href=\"#s2-br-recursos\" data-target=\"s2-br-recursos\"><span>🛢️</span><strong>Recursos e sistemas</strong><small>03</small></a><a class=\"chapter-card desert\" href=\"#s2-br-mapa\" data-target=\"s2-br-mapa\"><span>🏜️</span><strong>Mapa e posicionamento</strong><small>04</small></a><a class=\"chapter-card desert\" href=\"#s2-br-eventos\" data-target=\"s2-br-eventos\"><span>🦂</span><strong>Eventos e inimigos</strong><small>05</small></a><a class=\"chapter-card desert\" href=\"#s2-br-simbolos\" data-target=\"s2-br-simbolos\"><span>☀️</span><strong>Símbolos do tema</strong><small>06</small></a><a class=\"chapter-card desert\" href=\"#s2-br-preparo\" data-target=\"s2-br-preparo\"><span>🏺</span><strong>Preparação</strong><small>07</small></a><a class=\"chapter-card desert\" href=\"#s2-br-aviso\" data-target=\"s2-br-aviso\"><span>🌪️</span><strong>Aviso importante</strong><small>08</small></a></div><article class=\"chapter desert-chapter\" id=\"s2-br-visao\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Visão geral</h2><p>A Dinastia do Deserto parece continuar o modelo de temporadas com um novo mapa desértico, controle de território e disputa de ranking. O recurso central é o Óleo Escuro. Cidades capturadas na Dinastia do Mar de Areia produzem Óleo Escuro com o tempo, e o ranking final depende muito de quanto Óleo Escuro a união mantém. A lição da Temporada 1 continua: a temporada não é vencida por lutas aleatórias, mas por posicionamento, rotas, diplomacia e disciplina.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-br-objetivos\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Objetivos principais</h2><p>Os objetivos principais são capturar cidades úteis, proteger a produção, coletar Óleo Escuro com eficiência e manter um caminho estável para objetivos valiosos. A Cidade Real continua importante, mas o progresso diário vem de manter território produtivo. A união deve decidir cedo quais cidades são realistas, quais rotas consegue defender e onde diplomacia é melhor que perda de tropas.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-br-recursos\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Recursos e sistemas</h2><p>Termos conhecidos da prévia incluem Óleo Escuro, Água Sagrada, Cobre Vermelho, Elixir e Bronze. Os valores exatos podem mudar; por isso, telas oficiais do evento e calendário devem ser a fonte principal. A estrutura aponta para prédios sazonais e sistemas como Centro da União, Árvore da Vida, Fonte da Vida, Altar dos Heróis e Campo de Treinamento dos Heróis.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-br-mapa\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Mapa e posicionamento</h2><p>Temporadas de deserto provavelmente recompensam uniões que controlam rotas, evitam se espalhar demais e mantêm jogadores ativos perto de objetivos estratégicos. Não espalhe castelos sem motivo. Uma formação compacta é mais fácil de reforçar, coordenar e defender durante janelas de guerra. Se houver mecânicas de tempestade de areia ou calor, o posicionamento será ainda mais importante.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-br-eventos\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Eventos e inimigos</h2><p>As prévias mencionam Bestas de Areia, Mercado do Deserto e Escamas de Besta de Areia. Trate isso como oportunidades recorrentes de progresso: use stamina com intenção, não esvazie antes de eventos importantes e priorize alvos que ajudem tanto o jogador quanto o ranking da união.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-br-simbolos\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Símbolos do tema</h2><p>O inverno usou cristais de gelo e flocos de neve. Para a Dinastia do Deserto, combinam símbolos como dunas, sol, tempestade de areia, escorpião, cobra, caravana, ânfora e barris de Óleo Escuro. Eles deixam claro se o guia é de inverno ou deserto.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-br-preparo\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Preparação</h2><p>Antes da Temporada 2, as uniões devem organizar canais de liderança, preparar posts traduzidos, definir comunicação de recompensas e acostumar jogadores a consultar o calendário do evento. Guarde recursos flexíveis, evite caos de última hora e considere que as regras oficiais podem mudar por semana.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-br-aviso\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Aviso importante</h2><p>Esta é uma seção de prévia, não uma doutrina final da Temporada 2. Quando houver tabelas oficiais, imagens e mecânicas testadas, este capítulo deve ser atualizado. Até lá, a estratégia segura é: coordenação, proteger produção, observar Óleo Escuro e não desperdiçar recursos em movimentos incertos.</p></article>", "fr": "<div class=\"lang-title\"><span>FR</span><div><h1>Saison 2 : Dynastie du Désert</h1><p>Guide d’aperçu – territoire, Huile Sombre et progression désertique</p></div></div><div class=\"card-grid\"><a class=\"chapter-card desert\" href=\"#s2-fr-apercu\" data-target=\"s2-fr-apercu\"><span>🏺</span><strong>Aperçu</strong><small>01</small></a><a class=\"chapter-card desert\" href=\"#s2-fr-objectifs\" data-target=\"s2-fr-objectifs\"><span>🏺</span><strong>Objectifs principaux</strong><small>02</small></a><a class=\"chapter-card desert\" href=\"#s2-fr-ressources\" data-target=\"s2-fr-ressources\"><span>🛢️</span><strong>Ressources et systèmes</strong><small>03</small></a><a class=\"chapter-card desert\" href=\"#s2-fr-carte\" data-target=\"s2-fr-carte\"><span>🏜️</span><strong>Carte et positionnement</strong><small>04</small></a><a class=\"chapter-card desert\" href=\"#s2-fr-evenements\" data-target=\"s2-fr-evenements\"><span>🏺</span><strong>Événements et ennemis</strong><small>05</small></a><a class=\"chapter-card desert\" href=\"#s2-fr-symboles\" data-target=\"s2-fr-symboles\"><span>☀️</span><strong>Symboles du thème</strong><small>06</small></a><a class=\"chapter-card desert\" href=\"#s2-fr-preparation\" data-target=\"s2-fr-preparation\"><span>🏺</span><strong>Préparation</strong><small>07</small></a><a class=\"chapter-card desert\" href=\"#s2-fr-avertissement\" data-target=\"s2-fr-avertissement\"><span>🌪️</span><strong>Avertissement important</strong><small>08</small></a></div><article class=\"chapter desert-chapter\" id=\"s2-fr-apercu\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Aperçu</h2><p>La Dynastie du Désert semble poursuivre le modèle saisonnier avec une nouvelle carte désertique, du contrôle de territoire et une forte pression de classement. La ressource centrale est l’Huile Sombre. Les villes capturées dans la Dynastie de la Mer de Sable produisent de l’Huile Sombre avec le temps, et le classement final dépend largement de la quantité conservée par l’union. La leçon de la Saison 1 reste valable : on ne gagne pas par combats aléatoires, mais par positionnement, routes, diplomatie et discipline.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-fr-objectifs\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Objectifs principaux</h2><p>Les objectifs sont de capturer des villes utiles, protéger la production, collecter l’Huile Sombre efficacement et garder une route stable vers les objectifs de grande valeur. La Ville Royale reste importante, mais le progrès quotidien vient du territoire productif tenu. Une union doit décider tôt quelles villes sont réalistes, quelles routes défendre et où la diplomatie vaut mieux que les pertes.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-fr-ressources\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Ressources et systèmes</h2><p>Les termes connus incluent Huile Sombre, Eau Sacrée, Cuivre Rouge, Élixir et Bronze. Les valeurs exactes peuvent changer ; les écrans officiels et le calendrier doivent rester la référence. La structure suggère des bâtiments saisonniers et des systèmes comme Centre de l’Union, Arbre de Vie, Fontaine de Vie, Autel des Héros et Terrain d’Entraînement des Héros.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-fr-carte\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Carte et positionnement</h2><p>Les saisons désertiques récompenseront probablement les unions qui contrôlent les routes, évitent la dispersion et gardent les joueurs actifs près des objectifs. Ne dispersez pas les châteaux sans raison. Une formation compacte est plus facile à renforcer, coordonner et défendre. Si des mécaniques de tempête de sable ou de chaleur apparaissent, le placement deviendra encore plus important.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-fr-evenements\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Événements et ennemis</h2><p>Les aperçus mentionnent Bêtes de Sable, Marché du Désert et Écailles de Bête de Sable. Traitez-les comme des sources de progression récurrentes : utilisez l’endurance avec intention, ne la videz pas avant les fenêtres importantes et ciblez ce qui aide le joueur et le classement de l’union.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-fr-symboles\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Symboles du thème</h2><p>L’hiver utilisait cristaux de glace et flocons. Pour la Dynastie du Désert : dunes, soleil, tempête de sable, scorpion, cobra, caravane, amphore et barils d’Huile Sombre. Ces symboles aident à reconnaître immédiatement la saison du guide.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-fr-preparation\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Préparation</h2><p>Avant la Saison 2, les unions devraient organiser les canaux de direction, préparer les traductions, clarifier la distribution des récompenses et habituer les joueurs à lire le calendrier. Gardez des ressources flexibles, évitez le chaos de dernière minute et supposez que les règles peuvent changer chaque semaine.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-fr-avertissement\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Avertissement important</h2><p>Ceci est un aperçu, pas une doctrine finale de Saison 2. Dès que les tableaux officiels, captures et mécaniques testées seront disponibles, cette section devra être mise à jour. En attendant : coordination, protection de la production, attention à l’Huile Sombre et pas de gaspillage sur des mouvements incertains.</p></article>", "gr": "<div class=\"lang-title\"><span>GR</span><div><h1>Season 2: Δυναστεία της Ερήμου</h1><p>Προεπισκόπηση – έδαφος, Σκοτεινό Λάδι και πρόοδος στην έρημο</p></div></div><div class=\"card-grid\"><a class=\"chapter-card desert\" href=\"#s2-gr-overview\" data-target=\"s2-gr-overview\"><span>🏺</span><strong>Επισκόπηση</strong><small>01</small></a><a class=\"chapter-card desert\" href=\"#s2-gr-goals\" data-target=\"s2-gr-goals\"><span>🏺</span><strong>Κύριοι στόχοι</strong><small>02</small></a><a class=\"chapter-card desert\" href=\"#s2-gr-resources\" data-target=\"s2-gr-resources\"><span>🏺</span><strong>Πόροι και συστήματα</strong><small>03</small></a><a class=\"chapter-card desert\" href=\"#s2-gr-map\" data-target=\"s2-gr-map\"><span>🏺</span><strong>Χάρτης και τοποθέτηση</strong><small>04</small></a><a class=\"chapter-card desert\" href=\"#s2-gr-events\" data-target=\"s2-gr-events\"><span>🦂</span><strong>Events και εχθροί</strong><small>05</small></a><a class=\"chapter-card desert\" href=\"#s2-gr-symbols\" data-target=\"s2-gr-symbols\"><span>🏺</span><strong>Σύμβολα θέματος</strong><small>06</small></a><a class=\"chapter-card desert\" href=\"#s2-gr-prep\" data-target=\"s2-gr-prep\"><span>🏺</span><strong>Προετοιμασία</strong><small>07</small></a><a class=\"chapter-card desert\" href=\"#s2-gr-warning\" data-target=\"s2-gr-warning\"><span>🏺</span><strong>Σημαντική προειδοποίηση</strong><small>08</small></a></div><article class=\"chapter desert-chapter\" id=\"s2-gr-overview\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Επισκόπηση</h2><p>Η Δυναστεία της Ερήμου φαίνεται να συνεχίζει το μοντέλο των seasons με νέο χάρτη ερήμου, έλεγχο εδαφών και πίεση κατάταξης. Ο βασικός πόρος είναι το Σκοτεινό Λάδι. Οι κατειλημμένες πόλεις παράγουν Σκοτεινό Λάδι με τον χρόνο και η τελική κατάταξη εξαρτάται πολύ από το πόσο κρατά η ένωση. Το μάθημα από την Season 1 παραμένει: δεν κερδίζει το τυχαίο fighting, αλλά η θέση, οι διαδρομές, η διπλωματία και η πειθαρχία.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-gr-goals\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Κύριοι στόχοι</h2><p>Οι στόχοι είναι χρήσιμες πόλεις, προστασία παραγωγής, αποτελεσματική συλλογή Σκοτεινού Λαδιού και σταθερή πορεία προς σημαντικούς στόχους. Η Βασιλική Πόλη παραμένει σημαντική, αλλά η καθημερινή πρόοδος έρχεται από παραγωγικά εδάφη. Η ένωση πρέπει νωρίς να αποφασίσει ποιες πόλεις είναι ρεαλιστικές, ποιες διαδρομές αμύνονται και πού η διπλωματία είναι καλύτερη από απώλειες στρατευμάτων.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-gr-resources\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Πόροι και συστήματα</h2><p>Γνωστοί όροι προεπισκόπησης είναι Σκοτεινό Λάδι, Ιερό Νερό, Κόκκινος Χαλκός, Ελιξίριο και Μπρούντζος. Οι ακριβείς τιμές μπορεί να αλλάξουν, άρα οι επίσημες οθόνες και το ημερολόγιο είναι η βασική πηγή. Η δομή δείχνει seasonal buildings όπως Union Center, Tree of Life, Fountain of Life, Altar of Heroes και Heroes’ Training Ground.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-gr-map\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Χάρτης και τοποθέτηση</h2><p>Οι desert seasons πιθανότατα ανταμείβουν ενώσεις που ελέγχουν διαδρομές, αποφεύγουν υπερέκταση και κρατούν ενεργούς παίκτες κοντά σε στόχους. Μην σκορπίζετε castles χωρίς λόγο. Συμπαγής διάταξη ενισχύεται και συντονίζεται ευκολότερα. Αν εμφανιστούν sandstorm ή heat mechanics, η θέση θα γίνει ακόμη πιο κρίσιμη.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-gr-events\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Events και εχθροί</h2><p>Οι προεπισκοπήσεις αναφέρουν Sand Beasts, Desert Market και Sand Beast Scales. Δείτε τα ως επαναλαμβανόμενες ευκαιρίες προόδου: ξοδέψτε stamina με σκοπό, όχι πριν από σημαντικά events, και προτεραιοποιήστε στόχους που βοηθούν και τον παίκτη και το ranking της ένωσης.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-gr-symbols\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Σύμβολα θέματος</h2><p>Ο χειμώνας είχε κρυστάλλους πάγου και νιφάδες. Η έρημος ταιριάζει με αμμόλοφους, ήλιο, αμμοθύελλα, σκορπιό, κόμπρα, καραβάνι, αμφορέα και βαρέλια Σκοτεινού Λαδιού. Τα σύμβολα δείχνουν άμεσα αν ο οδηγός είναι winter ή desert.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-gr-prep\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Προετοιμασία</h2><p>Πριν την Season 2, οι ενώσεις πρέπει να οργανώσουν leadership channels, μεταφράσεις, επικοινωνία ανταμοιβών και συνήθεια ανάγνωσης event calendar. Κρατήστε ευέλικτους πόρους, αποφύγετε last-minute χάος και θεωρήστε πιθανό ότι οι κανόνες αλλάζουν ανά εβδομάδα.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-gr-warning\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Σημαντική προειδοποίηση</h2><p>Αυτό είναι preview, όχι τελική doctrine για Season 2. Όταν υπάρξουν επίσημα charts, screenshots και δοκιμασμένα mechanics, το κεφάλαιο πρέπει να ενημερωθεί. Μέχρι τότε: συντονισμός, προστασία παραγωγής, προσοχή στο Σκοτεινό Λάδι και όχι σπατάλη πόρων σε ασαφείς κινήσεις.</p></article>", "ro": "<div class=\"lang-title\"><span>RO</span><div><h1>Sezonul 2: Dinastia Deșertului</h1><p>Ghid de previzualizare – teritoriu, Ulei Întunecat și progres în deșert</p></div></div><div class=\"card-grid\"><a class=\"chapter-card desert\" href=\"#s2-ro-overview\" data-target=\"s2-ro-overview\"><span>🏺</span><strong>Prezentare generală</strong><small>01</small></a><a class=\"chapter-card desert\" href=\"#s2-ro-goals\" data-target=\"s2-ro-goals\"><span>🏺</span><strong>Obiective principale</strong><small>02</small></a><a class=\"chapter-card desert\" href=\"#s2-ro-resources\" data-target=\"s2-ro-resources\"><span>🏺</span><strong>Resurse și sisteme</strong><small>03</small></a><a class=\"chapter-card desert\" href=\"#s2-ro-map\" data-target=\"s2-ro-map\"><span>🏺</span><strong>Hartă și poziționare</strong><small>04</small></a><a class=\"chapter-card desert\" href=\"#s2-ro-events\" data-target=\"s2-ro-events\"><span>🏺</span><strong>Evenimente și inamici</strong><small>05</small></a><a class=\"chapter-card desert\" href=\"#s2-ro-symbols\" data-target=\"s2-ro-symbols\"><span>☀️</span><strong>Simboluri tematice</strong><small>06</small></a><a class=\"chapter-card desert\" href=\"#s2-ro-prep\" data-target=\"s2-ro-prep\"><span>🏺</span><strong>Pregătire</strong><small>07</small></a><a class=\"chapter-card desert\" href=\"#s2-ro-warning\" data-target=\"s2-ro-warning\"><span>🌪️</span><strong>Avertisment important</strong><small>08</small></a></div><article class=\"chapter desert-chapter\" id=\"s2-ro-overview\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Prezentare generală</h2><p>Dinastia Deșertului pare să continue modelul sezonier cu o hartă deșertică nouă, control teritorial și presiune de clasament. Resursa centrală este Uleiul Întunecat. Orașele capturate produc Ulei Întunecat în timp, iar clasamentul final depinde mult de cantitatea păstrată de uniune. Lecția din Sezonul 1 rămâne: sezonul nu se câștigă prin lupte aleatorii, ci prin poziționare, rute, diplomație și disciplină.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-ro-goals\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Obiective principale</h2><p>Obiectivele sunt capturarea orașelor utile, protejarea producției, colectarea eficientă a Uleiului Întunecat și menținerea unei rute stabile către obiective valoroase. Orașul Regal rămâne important, dar progresul zilnic vine din teritoriul productiv păstrat. Uniunea trebuie să decidă devreme ce orașe sunt realiste, ce rute pot fi apărate și unde diplomația e mai bună decât pierderea trupelor.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-ro-resources\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Resurse și sisteme</h2><p>Termenii cunoscuți includ Ulei Întunecat, Apă Sfântă, Cupru Roșu, Elixir și Bronz. Valorile exacte se pot schimba, deci ecranele oficiale și calendarul trebuie tratate ca sursă principală. Structura sugerează clădiri sezoniere și sisteme precum Union Center, Tree of Life, Fountain of Life, Altar of Heroes și Heroes’ Training Ground.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-ro-map\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Hartă și poziționare</h2><p>Sezoanele deșertice vor recompensa probabil uniunile care controlează rutele, evită extinderea excesivă și țin jucătorii activi aproape de obiective. Nu împrăștiați castelele fără motiv. O formație compactă se întărește, coordonează și apără mai ușor. Dacă apar mecanici de furtună de nisip sau căldură, poziționarea devine și mai importantă.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-ro-events\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Evenimente și inamici</h2><p>Previzualizările menționează Bestii de Nisip, Piața Deșertului și Solzi de Bestie de Nisip. Tratați-le ca oportunități recurente de progres: folosiți stamina cu scop, nu o consumați înainte de ferestre importante și prioritizați ținte care ajută atât jucătorul, cât și clasamentul uniunii.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-ro-symbols\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Simboluri tematice</h2><p>Iarna a folosit cristale de gheață și fulgi de zăpadă. Pentru Dinastia Deșertului se potrivesc dune, soare, furtună de nisip, scorpion, cobră, caravană, amforă și butoaie de U
