lei Întunecat. Simbolurile arată imediat dacă ghidul este de iarnă sau deșert.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-ro-prep\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Pregătire</h2><p>Înainte de Sezonul 2, uniunile ar trebui să organizeze canalele de conducere, postările traduse, comunicarea recompenselor și obiceiul de a verifica calendarul evenimentelor. Păstrați resurse flexibile, evitați haosul de ultim moment și presupuneți că regulile oficiale pot fi ajustate săptămânal.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-ro-warning\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Avertisment important</h2><p>Aceasta este o secțiune de previzualizare, nu o doctrină finală pentru Sezonul 2. Când apar tabele oficiale, capturi și mecanici testate, capitolul trebuie actualizat. Până atunci: coordonare, protejarea producției, atenție la Uleiul Întunecat și fără risipă pe mișcări neclare.</p></article>", "pl": "<div class=\"lang-title\"><span>PL</span><div><h1>Sezon 2: Dynastia Pustyni</h1><p>Podgląd poradnika – terytorium, Ciemna Ropa i rozwój pustynny</p></div></div><div class=\"card-grid\"><a class=\"chapter-card desert\" href=\"#s2-pl-overview\" data-target=\"s2-pl-overview\"><span>🏺</span><strong>Przegląd</strong><small>01</small></a><a class=\"chapter-card desert\" href=\"#s2-pl-goals\" data-target=\"s2-pl-goals\"><span>🏺</span><strong>Główne cele</strong><small>02</small></a><a class=\"chapter-card desert\" href=\"#s2-pl-resources\" data-target=\"s2-pl-resources\"><span>🛢️</span><strong>Zasoby i systemy</strong><small>03</small></a><a class=\"chapter-card desert\" href=\"#s2-pl-map\" data-target=\"s2-pl-map\"><span>🏜️</span><strong>Mapa i pozycja</strong><small>04</small></a><a class=\"chapter-card desert\" href=\"#s2-pl-events\" data-target=\"s2-pl-events\"><span>🏺</span><strong>Wydarzenia i wrogowie</strong><small>05</small></a><a class=\"chapter-card desert\" href=\"#s2-pl-symbols\" data-target=\"s2-pl-symbols\"><span>☀️</span><strong>Symbole motywu</strong><small>06</small></a><a class=\"chapter-card desert\" href=\"#s2-pl-prep\" data-target=\"s2-pl-prep\"><span>🏺</span><strong>Przygotowanie</strong><small>07</small></a><a class=\"chapter-card desert\" href=\"#s2-pl-warning\" data-target=\"s2-pl-warning\"><span>🏺</span><strong>Ważne ostrzeżenie</strong><small>08</small></a></div><article class=\"chapter desert-chapter\" id=\"s2-pl-overview\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Przegląd</h2><p>Dynastia Pustyni wygląda na kontynuację modelu sezonowego z nową pustynną mapą, kontrolą terytorium i presją rankingu. Głównym zasobem jest Ciemna Ropa. Zdobyte miasta produkują Ciemną Ropę z czasem, a końcowy ranking mocno zależy od ilości utrzymanej przez unię. Lekcja z Sezonu 1 pozostaje: sezonu nie wygrywa losowa walka, lecz pozycja, trasy, dyplomacja i dyscyplina.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-pl-goals\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Główne cele</h2><p>Cele to zdobywanie użytecznych miast, ochrona produkcji, efektywne zbieranie Ciemnej Ropy i utrzymanie stabilnej drogi do cennych celów. Miasto Królewskie nadal ma znaczenie, ale codzienny postęp wynika z utrzymanego produktywnego terenu. Unia powinna wcześnie ustalić, które miasta są realne, których tras bronić i gdzie dyplomacja jest lepsza niż straty wojsk.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-pl-resources\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Zasoby i systemy</h2><p>Znane terminy z podglądu to Ciemna Ropa, Święta Woda, Czerwona Miedź, Eliksir i Brąz. Dokładne wartości mogą się zmienić, więc oficjalne ekrany i kalendarz powinny być głównym źródłem. Struktura wskazuje na budynki sezonowe i systemy takie jak Union Center, Tree of Life, Fountain of Life, Altar of Heroes i Heroes’ Training Ground.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-pl-map\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Mapa i pozycja</h2><p>Sezony pustynne prawdopodobnie nagradzają unie kontrolujące trasy, unikające nadmiernego rozciągnięcia i trzymające aktywnych graczy blisko celów. Nie rozrzucajcie zamków bez celu. Zwarta formacja łatwiej się wzmacnia, koordynuje i broni. Jeśli pojawią się mechaniki burzy piaskowej lub gorąca, pozycja będzie jeszcze ważniejsza.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-pl-events\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Wydarzenia i wrogowie</h2><p>Podglądy wspominają Piaskowe Bestie, Targ Pustyni i Łuski Piaskowej Bestii. Traktujcie je jako powtarzalne okazje rozwoju: wydawajcie staminę z celem, nie opróżniajcie jej przed ważnymi oknami i priorytetyzujcie cele pomagające graczowi oraz rankingowi unii.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-pl-symbols\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Symbole motywu</h2><p>Zima używała kryształów lodu i płatków śniegu. Do Dynastii Pustyni pasują wydmy, słońce, burza piaskowa, skorpion, kobra, karawana, amfora i beczki Ciemnej Ropy. Symbole od razu pokazują, czy poradnik dotyczy zimy czy pustyni.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-pl-prep\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Przygotowanie</h2><p>Przed Sezonem 2 unie powinny uporządkować kanały dowodzenia, przygotować tłumaczone posty, ustalić komunikację nagród i przyzwyczaić graczy do czytania kalendarza wydarzeń. Zachowajcie elastyczne zasoby, unikajcie chaosu na ostatnią chwilę i zakładajcie, że oficjalne zasady mogą zmieniać się co tydzień.</p></article>\n<article class=\"chapter desert-chapter\" id=\"s2-pl-warning\"><a class=\"toplink\" href=\"#seasonHeader\" title=\"Top\">⬆</a><h2>Ważne ostrzeżenie</h2><p>To sekcja podglądowa, nie finalna doktryna Sezonu 2. Gdy pojawią się oficjalne tabele, zrzuty i przetestowane mechaniki, rozdział trzeba zaktualizować. Do tego czasu: koordynacja, ochrona produkcji, uwaga na Ciemną Ropę i brak marnowania zasobów na niejasne ruchy.</p></article>"}, "s1Chapters": {"en": [{"id": "en-1-purpose-and-source-hierarchy", "title": "Purpose and source hierarchy"}, {"id": "en-2-season-1-in-one-sentence", "title": "Season 1 in one sentence"}, {"id": "en-3-preparation-before-entering-the-season", "title": "Preparation before entering the season"}, {"id": "en-4-heat-freezing-and-furnaces", "title": "Heat, freezing and furnaces"}, {"id": "en-5-castle-placement-and-contaminated-land", "title": "Castle placement and contaminated land"}, {"id": "en-6-mines-cities-and-ice-crystals", "title": "Mines, cities and ice crystals"}, {"id": "en-7-route-planning-and-early-expansion", "title": "Route planning and early expansion"}, {"id": "en-8-kingdom-expedition-and-outposts", "title": "Kingdom Expedition and outposts"}, {"id": "en-9-diplomacy-war-days-and-tiles", "title": "Diplomacy, war days and tiles"}, {"id": "en-10-class-hall-class-skills-and-reset-strategy", "title": "Class Hall, class skills and reset strategy"}, {"id": "en-11-heroes-season-boosts-crystal-and-level-swap", "title": "Heroes, Season Boosts, Crystal and Level Swap"}, {"id": "en-12-level-6-cities-royal-city-and-endgame-timing", "title": "Level 6 cities, Royal City and endgame timing"}, {"id": "en-13-after-season-1-and-black-market", "title": "After Season 1 and Black Market"}, {"id": "en-14-daily-leadership-checklist", "title": "Daily leadership checklist"}, {"id": "en-15-glossary-and-final-summary", "title": "Glossary and final summary"}], "de": [{"id": "de-1-zweck-und-quellengewichtung", "title": "Zweck und Quellengewichtung"}, {"id": "de-2-season-1-in-einem-satz", "title": "Season 1 in einem Satz"}, {"id": "de-3-vorbereitung-vor-season-start", "title": "Vorbereitung vor Season-Start"}, {"id": "de-4-warme-einfrieren-und-ofen", "title": "Wärme, Einfrieren und Öfen"}, function renderNav(){const chapters=getChapters(); $('sideNav').innerHTML=chapters.map(c=>`<a class="nav-link" href="#${c.id}"><span>${chapterIcon(c.title)}</span><b>${c.title}</b></a>`).join(''); $('cardGrid').innerHTML=chapters.map((c,i)=>`<a class="chapter-card" href="#${c.id}"><span>${chapterIcon(c.title)}</span><strong>${c.title}</strong><small>${String(i+1).padStart(2,'0')}</small></a>`).join('');}
function renderContent(){$('contentArea').innerHTML=getContent();}
function render(){applyLabels(); setTheme(); $('seasonSelect').value=state.season; $('langSelect').value=state.lang; $('homeLang').value=state.lang; renderNav(); renderContent(); filterContent();}
function openGuide(season){state.season=season; $('home').style.display='none'; $('guide').classList.add('active'); render(); window.scrollTo(0,0);}
function goHome(){$('guide').classList.remove('active'); $('home').style.display='grid'; document.body.className='home-theme'; createFx('both'); window.scrollTo(0,0);}
function filterContent(){const q=$('searchBox').value.trim().toLowerCase(); document.querySelectorAll('#contentArea .chapter').forEach(ch=>{ch.style.display=!q||ch.textContent.toLowerCase().includes(q)?'block':'none';}); document.querySelectorAll('#cardGrid .chapter-card,#sideNav .nav-link').forEach(a=>{a.style.display=!q||a.textContent.toLowerCase().includes(q)?'flex':'none';});}
function createFx(mode){const fx=$('fx'); fx.innerHTML=''; const type=mode||state.season; const n= type==='both'?30:42; for(let i=0;i<n;i++){const el=document.createElement('span'); if(type==='desert'){el.className='sand'; el.style.top=(Math.random()*100)+'vh'; el.style.animationDuration=(8+Math.random()*10)+'s'; el.style.animationDelay=(-Math.random()*12)+'s';} else if(type==='winter'){el.className='flake'; el.textContent=Math.random()>.5?'❄':'✦'; el.style.left=(Math.random()*100)+'vw'; el.style.fontSize=(8+Math.random()*16)+'px'; el.style.setProperty('--drift',(Math.random()*120-60)+'px'); el.style.animationDuration=(9+Math.random()*15)+'s'; el.style.animationDelay=(-Math.random()*18)+'s';} else {el.className=Math.random()>.5?'flake':'sand'; if(el.className==='flake'){el.textContent='❄';el.style.left=(Math.random()*100)+'vw';el.style.fontSize=(8+Math.random()*13)+'px';el.style.setProperty('--drift',(Math.random()*100-50)+'px');el.style.animationDuration=(10+Math.random()*14)+'s';} else {el.style.top=(Math.random()*100)+'vh';el.style.animationDuration=(8+Math.random()*10)+'s';}} fx.appendChild(el);}}
$('homeLang').addEventListener('change',e=>{state.lang=e.target.value; render();});
document.querySelectorAll('.season-card').forEach(b=>b.addEventListener('click',()=>openGuide(b.dataset.season)));
$('seasonSelect').addEventListener('change',e=>{state.season=e.target.value; render(); window.scrollTo(0,0);});
$('langSelect').addEventListener('change',e=>{state.lang=e.target.value; render(); window.scrollTo(0,0);});
$('searchBox').addEventListener('input',filterContent);
$('mobileMenu').addEventListener('click',()=>$('sidebar').classList.toggle('open'));
$('mobileHome').addEventListener('click',goHome); $('backHome').addEventListener('click',goHome);
document.addEventListener('click',e=>{if(e.target.closest('.nav-link,.chapter-card')) $('sidebar').classList.remove('open');});
fillLangSelect($('homeLang')); fillLangSelect($('langSelect')); createFx('both'); applyLabels();
</script>
</body>
</html>
